:root {

  --paper-2:    #FBF6E8;
  --paper-3:    #FFFCF3;
  --ink:        #2A261D;
  --ink-2:      #534D40;
  --muted:      #8A8275;
  --dim:        #B5AE9F;
  --border:     rgba(42, 38, 29, 0.08);
  --border-2:   rgba(42, 38, 29, 0.18);

  --butter:        #FFD874;
  --butter-soft:   #FFEBA6;
  --peach:         #FFB48A;
  --peach-soft:    #FFD7BB;
  --blush:         #F4A7BE;
  --blush-soft:    #FCD3DD;
  --lavender:      #BBADE7;
  --lavender-soft: #DFD7F1;
  --sky:           #92C4E6;
  --sky-soft:      #C6E0EF;
  --mint:          #9BD3A3;
  --mint-soft:     #CFEAD2;
  --coral:         #EE7E5F;
  --indigo:        #4A5BAE;

  --success:    #5C9F58;
  --warn:       #C68A2F;
  --danger:     #DC5F65;

  --check:      #5C9F58;
  --gold:       #C68A2F;
  --accent:     #4A5BAE;
  --bg:         #F5EFE0;
  --text:       #2A261D;
  --sat:        #5C9F58;

  --shadow-xs:  0 1px 2px rgba(42, 38, 29, 0.06);
  --shadow-sm:  0 2px 8px rgba(42, 38, 29, 0.06);
  --shadow:     0 10px 28px -8px rgba(42, 38, 29, 0.18);
  --shadow-lg:  0 24px 48px -12px rgba(42, 38, 29, 0.22);

  --r-xs: 8px;
  --r-sm: 12px;
  --r:    18px;
  --r-lg: 24px;
  --r-xl: 32px;
}

:root[data-theme="dark"] {
  --paper:      #161310;
  --paper-2:    #1F1B16;
  --paper-3:    #26211A;
  --ink:        #F2EAD7;
  --ink-2:      #C7BDA6;
  --muted:      #8E8472;
  --dim:        #5F574A;
  --border:     rgba(242, 234, 215, 0.08);
  --border-2:   rgba(242, 234, 215, 0.16);

  --butter:        #D4A33A;
  --butter-soft:   #44351A;
  --peach:         #C76F4A;
  --peach-soft:    #3F2820;
  --blush:         #B85D7A;
  --blush-soft:    #3D2229;
  --lavender:      #8E7CCC;
  --lavender-soft: #2A2440;
  --sky:           #5A98C2;
  --sky-soft:      #1C2D3D;
  --mint:          #66A973;
  --mint-soft:     #1E3525;
  --coral:         #E36849;
  --indigo:        #7E8CD6;

  --success:    #6FB36A;
  --warn:       #D4A53C;
  --danger:     #E26973;

  --check:      #6FB36A;
  --gold:       #D4A33A;
  --accent:     #7E8CD6;
  --bg:         #161310;
  --text:       #F2EAD7;
  --sat:        #6FB36A;

  --shadow-xs:  0 1px 2px rgba(0, 0, 0, 0.4);
  --shadow-sm:  0 2px 8px rgba(0, 0, 0, 0.35);
  --shadow:     0 10px 28px -8px rgba(0, 0, 0, 0.55);
  --shadow-lg:  0 24px 48px -12px rgba(0, 0, 0, 0.65);

  color-scheme: dark;
}

:root[data-theme="dark"] .mini-bar,
:root[data-theme="dark"] .bar,
:root[data-theme="dark"] .deck-progress,
:root[data-theme="dark"] .pillar-bar {
  background: rgba(242, 234, 215, 0.08);
}
:root[data-theme="dark"] .task[data-cat="rest"] { border-color: var(--coral); }
:root[data-theme="dark"] .bubble { box-shadow: inset 0 -10px 18px rgba(0,0,0,0.25); }
:root[data-theme="dark"] meta[name="theme-color"] { /* placeholder */ }

/* ---------- Theme transition — soft radial bloom ----------
   Click the toggle: a circle of the new theme blooms out from the button
   with a soft feathered edge (like ink soaking through paper) on a smooth
   ease-out, while the button's icon spins and swaps. ~600ms — snappy. */
@property --reveal-radius {
  syntax: '<length>';
  initial-value: 0px;
  inherits: false;
}
::view-transition-old(root),
::view-transition-new(root) {
  mix-blend-mode: normal;
}
::view-transition-old(root) {
  animation: none;
  z-index: 1;
}
::view-transition-new(root) {
  z-index: 2;
  --reveal-radius: 0px;
  animation: themeReveal 650ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
  -webkit-mask: radial-gradient(
    circle at var(--theme-origin-x, 50%) var(--theme-origin-y, 50%),
    #000 calc(var(--reveal-radius) - 60px),
    transparent var(--reveal-radius)
  );
          mask: radial-gradient(
    circle at var(--theme-origin-x, 50%) var(--theme-origin-y, 50%),
    #000 calc(var(--reveal-radius) - 60px),
    transparent var(--reveal-radius)
  );
}
@keyframes themeReveal {
  from { --reveal-radius: 0px;    }
  to   { --reveal-radius: 3600px; }
}

:root.theme-transitioning,
:root.theme-transitioning * {
  /* suppress per-element bg transitions during reveal so the wave stays crisp */
  transition: none !important;
}

/* Fallback for browsers without View Transitions API */
.theme-sweep-fallback {
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  --reveal-radius: 0px;
  animation: themeReveal 650ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
  -webkit-mask: radial-gradient(
    circle at var(--theme-origin-x, 50%) var(--theme-origin-y, 50%),
    #000 calc(var(--reveal-radius) - 60px),
    transparent var(--reveal-radius)
  );
          mask: radial-gradient(
    circle at var(--theme-origin-x, 50%) var(--theme-origin-y, 50%),
    #000 calc(var(--reveal-radius) - 60px),
    transparent var(--reveal-radius)
  );
}

/* Toggle button itself — playful icon flip + pop while it triggers the wave */
.theme-toggle.toggling {
  animation: themeBtnPop 500ms cubic-bezier(0.34, 1.5, 0.64, 1);
}
.theme-toggle.toggling svg {
  animation: themeIconSwap 600ms cubic-bezier(0.34, 1.4, 0.64, 1);
}
@keyframes themeBtnPop {
  0%   { transform: scale(1);    }
  35%  { transform: scale(1.18); }
  100% { transform: scale(1);    }
}
@keyframes themeIconSwap {
  0%   { transform: rotate(0)        scale(1);   }
  40%  { transform: rotate(180deg)   scale(0.4); }
  100% { transform: rotate(360deg)   scale(1);   }
}

/* ---------- Per-tab accent palette ---------- */
:root {
  --tab-accent:      var(--coral);
  --tab-accent-soft: var(--peach-soft);
}
:root[data-tab="today"]     { --tab-accent: #C68A2F; --tab-accent-soft: var(--butter-soft); }
:root[data-tab="week"]      { --tab-accent: #6E5BAB; --tab-accent-soft: var(--lavender-soft); }
:root[data-tab="anki"]      { --tab-accent: #D45670; --tab-accent-soft: var(--blush-soft); }
:root[data-tab="running"]   { --tab-accent: #4F9F4D; --tab-accent-soft: var(--mint-soft); }
:root[data-tab="mcat"]      { --tab-accent: #D4683F; --tab-accent-soft: var(--peach-soft); }
:root[data-tab="dashboard"] { --tab-accent: #4A5BAE; --tab-accent-soft: var(--sky-soft); }
:root[data-tab="settings"]  { --tab-accent: #7A715F; --tab-accent-soft: var(--paper-2); }

:root[data-theme="dark"][data-tab="today"]     { --tab-accent: #E0A93C; }
:root[data-theme="dark"][data-tab="week"]      { --tab-accent: #A293DC; }
:root[data-theme="dark"][data-tab="anki"]      { --tab-accent: #E37A8E; }
:root[data-theme="dark"][data-tab="running"]   { --tab-accent: #6FB36A; }
:root[data-theme="dark"][data-tab="mcat"]      { --tab-accent: #E68258; }
:root[data-theme="dark"][data-tab="dashboard"] { --tab-accent: #8E9CDC; }
:root[data-theme="dark"][data-tab="settings"]  { --tab-accent: #B5AC97; }

.title-dynamic { transition: color 0.4s cubic-bezier(0.16,1,0.3,1); min-width: 1ch; }
.scribble      { color: var(--tab-accent); transition: color 0.4s cubic-bezier(0.16,1,0.3,1); }
.hero-eyebrow  { transition: color 0.4s ease; }

/* tab pill colors are already set explicitly per-tab; nothing else changes broadly */

html { transition: background-color 0.35s ease; background: var(--paper); }
body { transition: background-color 0.35s ease, color 0.35s ease; }
.panel, .stat-card, .deck, .day-card, .task, nav.tabs, .cd-item, .exam-item, .cars-item, .resource-btn, .btn-ghost, .progress-pill, .sleep-block, .bubble-chart, textarea.notes, select, input[type="text"], input[type="number"], input[type="date"], input[type="time"], input[type="password"] {
  transition: background-color 0.35s ease, color 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

header.hero {
  position: relative;
  padding: 32px clamp(16px, 4vw, 32px) 18px;
  z-index: 1;
  max-width: 1280px;
  margin: 0 auto;
}
.hero-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  flex-wrap: wrap;
  gap: 24px;
}
.hero-title-wrap {
  position: relative;
  flex: 1 1 auto;
  min-width: 0;
}
.hero-eyebrow {
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 2.4px;
  font-weight: 700;
  margin-bottom: 4px;
}
h1 {
  font-family: 'Instrument Serif', Georgia, serif;
  font-weight: 400;
  font-size: clamp(40px, 8vw, 72px);
  line-height: 0.95;
  letter-spacing: -0.025em;
  color: var(--ink);
  position: relative;
  display: block;
  white-space: nowrap;
}
h1 .accent { font-style: italic; color: var(--coral); }
.title-static { margin-right: 10px; }
.title-static, .title-dynamic { display: inline-block; }
h1 .title-dynamic { font-style: italic; color: var(--tab-accent); }
.title-dynamic { transition: color 0.3s ease; min-width: 1ch; }
.title-dynamic.swap-out {
  animation: titleSwapOut 0.22s cubic-bezier(0.4,0,1,1) forwards;
}
.title-dynamic.swap-in {
  animation: titleSwapIn 0.42s cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes titleSwapOut {
  to { opacity: 0; transform: translateY(-8px) rotate(-2deg); filter: blur(2px); }
}
@keyframes titleSwapIn {
  from { opacity: 0; transform: translateY(10px) rotate(1.5deg); filter: blur(3px); }
  to   { opacity: 1; transform: translateY(0)   rotate(0);       filter: blur(0); }
}
.scribble {
  display: inline-block;
  margin-left: 14px;
  width: clamp(36px, 5vw, 56px);
  height: clamp(24px, 3.4vw, 36px);
  pointer-events: none;
  color: var(--tab-accent);
  vertical-align: 0.35em;
}
.scribble path {
  stroke-dasharray: 120;
  stroke-dashoffset: 0;
}
.scribble.replay path {
  animation: scribbleDraw 0.7s cubic-bezier(0.65, 0, 0.35, 1) both;
}

/* ---------- Launch animation ---------- */
body.launching .hero-eyebrow,
body.launching #hero-title .title-static,
body.launching #hero-title .title-dynamic,
body.launching .scribble path,
body.launching .countdown .cd-item,
body.launching nav.tabs {
  opacity: 0;
}
body.launched .hero-eyebrow {
  animation: launchFadeUp 0.6s cubic-bezier(0.16,1,0.3,1) 1.85s both;
}
body.launched #hero-title .title-static {
  animation: titleSettle 0.7s cubic-bezier(0.16,1,0.3,1) 1.95s both;
}
body.launched #hero-title .title-dynamic {
  animation: titleSettle 0.7s cubic-bezier(0.16,1,0.3,1) 2.05s both;
}
body.launched .scribble path {
  animation: scribbleDraw 0.7s cubic-bezier(0.65,0,0.35,1) 2.3s both;
}
body.launched .countdown .cd-item {
  animation: cdSwing 0.7s cubic-bezier(0.16,1,0.3,1) both;
}
body.launched .countdown .cd-item:nth-child(1) { animation-delay: 2.1s; }
body.launched .countdown .cd-item:nth-child(2) { animation-delay: 2.22s; }
body.launched nav.tabs {
  animation: launchFadeUp 0.55s cubic-bezier(0.16,1,0.3,1) 2.3s both;
}

@keyframes launchFadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0);    }
}
@keyframes titleSettle {
  0%   { opacity: 0; transform: translateY(22px) scale(0.96); filter: blur(4px); }
  60%  { filter: blur(0); }
  100% { opacity: 1; transform: translateY(0)    scale(1);    filter: blur(0); }
}
@keyframes scribbleDraw {
  from { stroke-dashoffset: 120; }
  to   { stroke-dashoffset: 0;   }
}
@keyframes cdSwing {
  from { opacity: 0; transform: translateY(-18px) rotate(4deg); }
  to   { opacity: 1; transform: translateY(0)    rotate(0);    }
}

/* ---------- Launch overlay (Master Plan · Companion logo reveal) ---------- */
.launch-overlay {
  position: fixed;
  /* Explicit offsets as fallback — older iOS Safari doesn't always apply
     inset: 0 before the first paint, causing a 1-frame position glitch. */
  top: 0; right: 0; bottom: 0; left: 0;
  inset: 0;
  width: 100%; height: 100%;          /* belt-and-suspenders sizing */
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  background: var(--paper);
  animation: overlayFade 0.55s cubic-bezier(0.65,0,0.35,1) 1.75s forwards;
  /* Force the overlay onto its own GPU layer immediately so it's composited
     at the correct position before any animated children create their own. */
  transform: translateZ(0);
  -webkit-transform: translateZ(0);
}
.launch-logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 34px;
}
.launch-title {
  font-family: 'Instrument Serif', Georgia, serif;
  font-weight: 400;
  font-size: clamp(54px, 11vw, 96px);
  line-height: 0.95;
  letter-spacing: -0.025em;
  color: var(--ink);
  white-space: nowrap;
  display: inline-flex;
  align-items: baseline;
}
.launch-master, .launch-plan { display: inline-block; }
.launch-master {
  margin-right: 14px;
  opacity: 0;
  animation: launchWord 0.7s cubic-bezier(0.16,1,0.3,1) 0.15s forwards;
}
.launch-plan {
  font-style: italic;
  color: #4A5BAE; /* dashboard indigo accent — matches "Master Plan." identity */
  opacity: 0;
  animation: launchWord 0.7s cubic-bezier(0.16,1,0.3,1) 0.35s forwards;
}
:root[data-theme="dark"] .launch-plan { color: #8E9CDC; }
.launch-scribble {
  display: inline-block;
  width: clamp(44px, 6vw, 70px);
  height: clamp(30px, 4vw, 44px);
  margin-left: 14px;
  color: #4A5BAE;
  vertical-align: 0.32em;
}
:root[data-theme="dark"] .launch-scribble { color: #8E9CDC; }
.launch-scribble path {
  stroke-dasharray: 120;
  stroke-dashoffset: 120;
  animation: scribbleDraw 0.7s cubic-bezier(0.65,0,0.35,1) 0.75s forwards;
}
.launch-companion {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 23px;
  font-weight: 600;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--ink-2);
  opacity: 0;
  padding-left: 5px; /* visual balance for tracked-out letters */
  animation: companionIn 0.7s cubic-bezier(0.16,1,0.3,1) 1.05s forwards;
}
.launch-logo {
  animation: logoExit 0.6s cubic-bezier(0.65,0,0.35,1) 1.75s forwards;
}
@keyframes launchWord {
  /* filter: blur removed — it triggers a GPU compositing layer on iOS before
     layout is settled, causing the text to flash at the wrong position. */
  0%   { opacity: 0; transform: translateY(28px) scale(0.96); }
  100% { opacity: 1; transform: translateY(0)    scale(1);    }
}
@keyframes companionIn {
  from { opacity: 0; transform: translateY(10px); letter-spacing: 14px; }
  to   { opacity: 1; transform: translateY(0);    letter-spacing: 5px;  }
}
@keyframes logoExit {
  from { opacity: 1; transform: scale(1)   translateY(0); }
  to   { opacity: 0; transform: scale(0.94) translateY(-12px); }
}
@keyframes overlayFade {
  from { opacity: 1; }
  to   { opacity: 0; visibility: hidden; }
}

/* Hide FABs during launch so they can't peek through any stacking edge case */
body.launching .toolbar-fab {
  opacity: 0;
  pointer-events: none;
  transition: none;
}

/* Preview-launch mode — overlay is shown statically so the layout can be edited */
body.preview-launch .launch-overlay {
  animation: none !important;
  opacity: 1 !important;
  visibility: visible !important;
  pointer-events: auto;
}
body.preview-launch .launch-logo,
body.preview-launch .launch-master,
body.preview-launch .launch-plan,
body.preview-launch .launch-companion {
  animation: none !important;
  opacity: 1 !important;
  transform: none !important;
  filter: none !important;
}
body.preview-launch .launch-scribble path {
  animation: none !important;
  stroke-dashoffset: 0 !important;
}
body.preview-launch .launch-companion {
  letter-spacing: 5px;
}

/* Content cascade — panels deal-up from below */
body.launched #content > * {
  animation: panelDealUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
}
body.launched #content > *:nth-child(1) { animation-delay: 1.95s; }
body.launched #content > *:nth-child(2) { animation-delay: 2.05s; }
body.launched #content > *:nth-child(3) { animation-delay: 2.15s; }
body.launched #content > *:nth-child(4) { animation-delay: 2.25s; }
body.launched #content > *:nth-child(n+5) { animation-delay: 2.35s; }
@keyframes panelDealUp {
  from { opacity: 0; transform: translateY(28px) scale(0.985); }
  to   { opacity: 1; transform: translateY(0)    scale(1);     }
}
body.launching #content > * { opacity: 0; }

@media (prefers-reduced-motion: reduce) {
  body.launching * { opacity: 1 !important; }
  body.launched  * { animation: none !important; }
  .launch-overlay { display: none !important; }
}

/* ---------- Theme toggle ---------- */
.toolbar-fab {
  position: fixed;
  z-index: 30;
  width: 44px;
  height: 44px;
  border-radius: 999px;
  border: 1px solid var(--border-2);
  background: var(--paper-3);
  color: var(--ink);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-sm);
  transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, transform 0.2s ease, box-shadow 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}
.toolbar-fab:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
.toolbar-fab:active { transform: translateY(0) scale(0.96); }
.toolbar-fab svg { width: 20px; height: 20px; transition: transform 0.4s cubic-bezier(0.16,1,0.3,1); }
.theme-toggle {
  top: max(16px, env(safe-area-inset-top));
  right: max(16px, env(safe-area-inset-right));
}
.launch-preview-btn {
  top: max(16px, env(safe-area-inset-top));
  right: calc(max(16px, env(safe-area-inset-right)) + 54px);
}
.launch-preview-btn.active {
  background: var(--tab-accent);
  color: #FFFCF3;
  border-color: var(--tab-accent);
}
.theme-toggle .icon-sun  { display: none; }
.theme-toggle .icon-moon { display: block; }
:root[data-theme="dark"] .theme-toggle .icon-sun  { display: block; }
:root[data-theme="dark"] .theme-toggle .icon-moon { display: none; }

@media (max-width: 600px) {
  .toolbar-fab { width: 40px; height: 40px; top: max(10px, env(safe-area-inset-top)); }
  .theme-toggle { right: 10px; }
  .launch-preview-btn { right: 58px; }
  .toolbar-fab svg { width: 18px; height: 18px; }
  header.hero { padding-right: 110px; }
}
.subtitle {
  color: var(--ink-2);
  font-size: 14px;
  margin-top: 10px;
  max-width: 460px;
}
#sync-indicator { margin-top: 8px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }

.countdown { display: flex; gap: 10px; }
.cd-item {
  background: var(--paper-3);
  border-radius: var(--r);
  padding: 12px 18px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  min-width: 100px;
}
.cd-item:nth-child(1) { background: var(--butter-soft); }
.cd-item:nth-child(2) { background: var(--peach-soft); }
.cd-num {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 36px;
  font-weight: 400;
  line-height: 1;
  color: var(--ink);
}
.cd-label {
  font-size: 9.5px;
  color: var(--ink-2);
  text-transform: uppercase;
  letter-spacing: 1.4px;
  font-weight: 700;
  margin-top: 6px;
}

nav.tabs {

.progress-pill {

.task-list { display: flex; flex-direction: column; gap: 10px; }

/* ---------- Task row + swipe-to-complete ---------- */
.task-row {
  position: relative;
  border-radius: var(--r);
  overflow: hidden;
  isolation: isolate;
}
.task-swipe-bg {
  position: absolute;
  inset: 0;
  border-radius: var(--r);
  background: linear-gradient(90deg, var(--success) 0%, color-mix(in srgb, var(--success) 78%, white 22%) 100%);
  color: #FFFCF3;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 26px;
  font-weight: 700;
  font-size: 14.5px;
  letter-spacing: 0.2px;
  opacity: 0;
  transition: opacity 0.18s ease;
  pointer-events: none;
  z-index: 0;
}
.task-row.swipe-enabled .task-swipe-bg { opacity: 0.55; }
.task-row.swiping  .task-swipe-bg { opacity: 1; }
.task-row.swipe-ready .task-swipe-bg { background: linear-gradient(90deg, var(--success), #7BC476); }
.task-swipe-icon {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(255,255,255,0.28);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 800;
  flex-shrink: 0;
}
.task-swipe-label { opacity: 0.95; }
.task-row .task {
  position: relative;
  z-index: 1;
  transform: translate3d(var(--swipe-x, 0px), 0, 0);
  transition: transform 0.32s cubic-bezier(0.16, 1, 0.3, 1);
  touch-action: pan-y;
}
.task-row .task:hover  { transform: translate3d(var(--swipe-x, 0px), -3px, 0) rotate(-0.4deg); }
.task-row .task:active { transform: translate3d(var(--swipe-x, 0px), 0, 0) scale(0.995); }
.task-row.swiping .task,
.task-row.swiping .task:hover,
.task-row.swiping .task:active { transform: translate3d(var(--swipe-x, 0px), 0, 0); }
.task-row.swiping .task { transition: none; touch-action: none; }
.task-row.swipe-complete .task { transition: transform 0.34s cubic-bezier(0.34, 1.36, 0.64, 1); }
.task-row.swipe-enabled .task::after {
  /* hide the right-side dot — the swipe affordance takes its place */
  display: none;
}
.task-row.swipe-enabled .task .task-content { padding-right: 18px; }
.task-row.swipe-hint .task {
  animation: swipeHint 1.6s cubic-bezier(0.4, 0, 0.6, 1) 1;
}
@keyframes swipeHint {
  0%   { transform: translate3d(0, 0, 0); }
  18%  { transform: translate3d(28px, 0, 0); }
  36%  { transform: translate3d(0, 0, 0); }
  100% { transform: translate3d(0, 0, 0); }
}

.task {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 22px;
  border-radius: var(--r);
  cursor: pointer;
  user-select: none;
  transition: transform 0.25s cubic-bezier(0.16,1,0.3,1), box-shadow 0.25s, opacity 0.2s;
  position: relative;
  overflow: hidden;
  background: var(--butter-soft);
  border: 1px solid rgba(42, 38, 29, 0.06);
  min-height: 60px;
}
.task::after {
  content: "";
  position: absolute;
  right: 22px; top: 50%;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--butter);
  transform: translateY(-50%);
  opacity: 0.9;
}
.task:hover {
  transform: translateY(-3px) rotate(-0.4deg);
  box-shadow: var(--shadow);
}
.task:active { transform: translateY(-1px) scale(0.995); }

.task[data-cat="run"]            { background: var(--mint-soft); }
.task[data-cat="run"]::after     { background: var(--mint); }
.task[data-cat="stretch"]        { background: var(--sky-soft); }
.task[data-cat="stretch"]::after { background: var(--sky); }
.task[data-cat="program"]        { background: var(--lavender-soft); }
.task[data-cat="program"]::after { background: var(--lavender); }
.task[data-cat="mcat"]           { background: var(--peach-soft); }
.task[data-cat="mcat"]::after    { background: var(--peach); }
.task[data-cat="anki"]           { background: var(--blush-soft); }
.task[data-cat="anki"]::after    { background: var(--blush); }
.task[data-cat="exam"]           { background: var(--butter-soft); }
.task[data-cat="exam"]::after    { background: var(--butter); }
.task[data-cat="examreview"]     { background: var(--peach-soft); }
.task[data-cat="examreview"]::after { background: var(--peach); }
.task[data-cat="rest"]           { background: var(--paper-2); border: 1px dashed var(--coral); }
.task[data-cat="rest"]::after    { background: var(--coral); }

.task.done { opacity: 0.55; }
.task.done .task-label { text-decoration: line-through; text-decoration-thickness: 1.5px; }
.checkbox {
  width: 28px;
  height: 28px;
  border: 2.5px solid var(--ink);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  background: var(--paper-3);
  transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
}
.task.done .checkbox {
  background: var(--ink);
  border-color: var(--ink);
  transform: scale(1.05);
}
.task.done .checkbox::after {

  font-weight: 700;
  font-size: 16px;
  line-height: 1;
}
.task-content { flex: 1; min-width: 0; padding-right: 32px; }
.task-label { font-size: 16px; font-weight: 600; color: var(--ink); line-height: 1.3; }
.task-meta { color: var(--ink-2); font-size: 12px; }

.cutback-banner {

.deck {

// ============================================================
// SCHEDULE DATA — from the Summer 2026 Master Planner PDFs
// plan = [MON, TUE, WED, THU, FRI, SAT, SUN]
// numeric = miles (run); string = cross-train; null = rest
// ============================================================
const WEEKS = [
  { id:1,  label:"Pre Wk 1",  start:"2026-05-18", total:10, cutback:false, program:false, plan:[2.5,null,2.5,"Bike 30m",1.5,3.5,null] },

  { id:3,  label:"Pre Wk 3",  start:"2026-06-01", total:12, cutback:false, program:false, plan:[3.0,null,2.5,"Bike 35m",2.5,4.0,null] },
  { id:4,  label:"Prog Wk 1", start:"2026-06-08", total:13, cutback:false, program:true,  plan:[3.0,null,3.0,"Swim 30m",2.5,4.5,null] },

  { id:6,  label:"Prog Wk 3", start:"2026-06-22", total:16, cutback:false, program:true,  plan:[4.0,null,3.5,"Swim 35m",3.0,5.5,null] },
  { id:7,  label:"Prog Wk 4", start:"2026-06-29", total:12, cutback:true,  program:true,  plan:[3.0,null,2.5,"Bike 25m",2.5,4.0,null] },

  { id:9,  label:"Prog Wk 6", start:"2026-07-13", total:19, cutback:false, program:true,  plan:[4.5,null,4.5,"Bike 45m",3.5,6.5,null] },
  { id:10, label:"Prog Wk 7", start:"2026-07-20", total:21, cutback:false, program:true,  plan:[5.0,null,5.0,"Swim 45m",4.0,7.0,null] },
  { id:11, label:"Prog Wk 8", start:"2026-07-27", total:16, cutback:true,  program:true,  plan:[4.0,null,3.5,"Bike 30m",3.0,5.5,null] },
];

const DOW_LABELS = ["MON","TUE","WED","THU","FRI","SAT","SUN"];
const DOW_FULL = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

const ANKI_DECKS = [
  { id:"behavioral", name:"Behavioral", total:827, perDay:11, color:"#a64dff", est:"Aug 1" },
  { id:"biochem",    name:"Biochem",    total:515, perDay:7,  color:"#ff8c42", est:"Jul 30" },
  { id:"biology",    name:"Biology",    total:604, perDay:8,  color:"#4ecb71", est:"Aug 1" },

];
const ANKI_TOTAL = ANKI_DECKS.reduce((s,d) => s + d.total, 0); // 2887
const ANKI_PER_DAY = ANKI_DECKS.reduce((s,d) => s + d.perDay, 0); // 38

const MARATHON_DATE = "2027-01-18";
const SUMMER_START = "2026-05-18";
const SUMMER_END = "2026-08-02";

// ============================================================
// HELPERS
// ============================================================
function isoDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function todayISO() { return isoDate(new Date()); }
function parseISO(iso) { return new Date(iso + "T12:00:00"); }
function addDays(iso, n) { const d = parseISO(iso); d.setDate(d.getDate()+n); return isoDate(d); }
function dayIdxFromISO(iso) { return (parseISO(iso).getDay() + 6) % 7; }
function findWeek(iso) {
  for (const w of WEEKS) {
    const end = addDays(w.start, 6);
    if (iso >= w.start && iso <= end) return w;
  }
  return null;
}
function daysBetween(a, b) {
  return Math.round((parseISO(b) - parseISO(a)) / 86400000);
}
function formatDate(iso) {
  return parseISO(iso).toLocaleDateString("en-US", { month:"long", day:"numeric", year:"numeric" });
}
function shortDate(iso) {
  const d = parseISO(iso);
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]);
}

// ============================================================

// ============================================================
function getDayInfo(iso) {
  const week = findWeek(iso);
  const dayIdx = dayIdxFromISO(iso);
  const dow = DOW_LABELS[dayIdx];
  if (!week) return { iso, week:null, dow, dayIdx, tasks: [] };
  const plan = week.plan[dayIdx];
  const tasks = [];

  if (dow === "TUE") {
    tasks.push({ id:"stretch", label:"Stretch 10 min" });
    if (week.program) tasks.push({ id:"program", label:"Summer Program 8 am – 5 pm" });
    tasks.push({ id:"rest", label:"National Soren Day — full rest · No MCAT · No Anki ♥", info:true });
  } else if (dow === "SUN") {
    tasks.push({ id:"stretch", label:"Stretch 10 min · easy walk" });
    if (week.program) {
      // Program weeks: full MCAT practice exam on Sundays
      tasks.push({ id:"exam", label:"Full MCAT Practice Exam" });
      tasks.push({ id:"examreview", label:"Exam Review + Analysis" });
    }
    // Any Sunday: Anki reviews / bonus cards (no new-card target, just log what you do)
    tasks.push({ id:"anki", label:"Anki — reviews + bonus cards" });
  } else if (dow === "SAT") {
    tasks.push({ id:"run", label:`Long Run ${plan} mi · Zone 2 (longest of week)`, miles: plan });
    tasks.push({ id:"stretch", label:"Stretch 10 min" });
    tasks.push({ id:"mcat", label:"MCAT Study 2 hrs" });
    tasks.push({ id:"anki", label:`Anki ${ANKI_PER_DAY} new + reviews` });
  } else if (dow === "THU") {
    tasks.push({ id:"run", label:`${plan} · Zone 1–2 (cross-train)`, cross:true });
    tasks.push({ id:"stretch", label:"Stretch 10 min" });
    if (week.program) tasks.push({ id:"program", label:"Summer Program 8 am – 5 pm" });
    tasks.push({ id:"mcat", label:"MCAT Study 2 hrs" });
    tasks.push({ id:"anki", label:`Anki ${ANKI_PER_DAY} new + reviews` });
  } else { // MON, WED, FRI
    tasks.push({ id:"run", label:`Run ${plan} mi · Zone 2`, miles: plan });
    tasks.push({ id:"stretch", label:"Stretch 10 min" });
    if (week.program) tasks.push({ id:"program", label:"Summer Program 8 am – 5 pm" });
    tasks.push({ id:"mcat", label:"MCAT Study 2 hrs" });
    tasks.push({ id:"anki", label:`Anki ${ANKI_PER_DAY} new + reviews` });
  }

  let sleep = "10:00 pm → 5:45 am · 7 h 45 min";
  if (dow === "TUE") sleep = "10:30 pm → 7:00 am · 8 h 30 min";
  else if (dow === "SAT") sleep = "10:00 pm → 6:30 am · 8 h 30 min";
  else if (dow === "SUN") sleep = "10:00 pm → 7:00 am · 9 h";

  return { iso, week, dow, dayIdx, tasks, sleep, plan };
}

// STATE / PERSISTENCE
// ============================================================
const STORAGE_KEY = "summer2026_portal_v1";

function defaultState() {
  return {
    checks: {},      // checks[date][taskId] = true
    notes: {},       // notes[date] = string
    anki: Object.fromEntries(ANKI_DECKS.map(d => [d.id, 0])),
    ankiDaily: {},   // ankiDaily[date][deckId] = cards completed that day
    runs: {},        // runs[date] = { actual, notes }
    exams: [],
    carsPassages: [],
    overrides: {},   // overrides[date] = { sleep?: {bedtime,wake,scope}, activity?: {type,note} }
    settings: {      // user preferences
      completionMode: { mobile: "swipe", desktop: "tap" }, // "tap" | "swipe"
    },
    savedAt: 0,      // ms timestamp of last local save — used to guard against stale Gist pulls
  };
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const s = JSON.parse(raw);
    const def = defaultState();
    return {
      checks: s.checks || {},
      notes: s.notes || {},
      anki: { ...def.anki, ...(s.anki || {}) },
      ankiDaily: s.ankiDaily || {},
      runs: s.runs || {},
      exams: s.exams || [],
      carsPassages: s.carsPassages || [],
      overrides: s.overrides || {},
      settings: {
        ...def.settings,
        ...(s.settings || {}),
        completionMode: { ...def.settings.completionMode, ...((s.settings && s.settings.completionMode) || {}) },
      },
      savedAt: s.savedAt || 0,
    };
  } catch (e) { return defaultState(); }
}
function saveState() {
  state.savedAt = Date.now();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  scheduleSyncSave();
}
function isChecked(date, taskId) { return !!(state.checks[date] && state.checks[date][taskId]); }
function setCheck(date, taskId, val) {
  if (!state.checks[date]) state.checks[date] = {};
  if (val) state.checks[date][taskId] = true;
  else delete state.checks[date][taskId];
  if (Object.keys(state.checks[date]).length === 0) delete state.checks[date];
  saveState();
}

let state = loadState();

// ============================================================
// CLOUD SYNC — GitHub Gist backend
// Token lives in localStorage only, never in code or the repo.
// ============================================================
const SYNC_TOKEN_KEY = "summer2026_sync_token";
const SYNC_GIST_KEY  = "summer2026_sync_gist";
const SYNC_LAST_KEY  = "summer2026_sync_last";
const GIST_FILENAME  = "summer2026_data.json";

let syncCfg = {
  token:  localStorage.getItem(SYNC_TOKEN_KEY) || "",
  gistId: localStorage.getItem(SYNC_GIST_KEY)  || "",
  last:   localStorage.getItem(SYNC_LAST_KEY)  || "",
  status: "idle",   // idle | loading | saving | error
  error:  "",
};

async function gistFetch(method, path, body) {
  const res = await fetch("https://api.github.com" + path, {
    method,
    headers: {
      "Authorization": "Bearer " + syncCfg.token,
      "Accept": "application/vnd.github+json",
      "Content-Type": "application/json",
      "X-GitHub-Api-Version": "2022-11-28",
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(res.status + ": " + txt.slice(0, 120));
  }
  return res.json();
}

async function findOrCreateGist() {
  for (let page = 1; page <= 5; page++) {
    const list = await gistFetch("GET", "/gists?per_page=100&page=" + page);
    const hit = list.find(g => g.files && g.files[GIST_FILENAME]);
    if (hit) return hit.id;
    if (list.length < 100) break;
  }
  const created = await gistFetch("POST", "/gists", {
    description: "Summer 2026 Planner sync data",
    public: false,
    files: { [GIST_FILENAME]: { content: JSON.stringify(state) } },
  });
  return created.id;
}

let _syncSaveTimer = null;
function scheduleSyncSave() {
  if (!syncCfg.token || !syncCfg.gistId) return;
  clearTimeout(_syncSaveTimer);
  _syncSaveTimer = setTimeout(pushToGist, 1500);
}

async function pushToGist() {
  if (!syncCfg.token || !syncCfg.gistId) return;
  syncCfg.status = "saving";
  updateSyncUI();
  try {
    await gistFetch("PATCH", "/gists/" + syncCfg.gistId, {
      files: { [GIST_FILENAME]: { content: JSON.stringify(state) } },
    });
    syncCfg.status = "idle";
    syncCfg.error = "";
    syncCfg.last = new Date().toISOString();
    localStorage.setItem(SYNC_LAST_KEY, syncCfg.last);
  } catch (e) {
    syncCfg.status = "error";
    syncCfg.error = e.message;
  }
  updateSyncUI();
}

async function pullFromGist() {
  if (!syncCfg.token || !syncCfg.gistId) return false;
  syncCfg.status = "loading";
  updateSyncUI();
  try {
    const gist = await gistFetch("GET", "/gists/" + syncCfg.gistId);
    const raw = gist.files[GIST_FILENAME]?.content;
    if (!raw) { syncCfg.status = "idle"; updateSyncUI(); return false; }
    const remote = JSON.parse(raw);

    // Guard: if local data was saved more recently than the Gist, don't let
    // the network response overwrite in-flight changes the user just made.
    // Instead, push local data up so the Gist catches up.
    if (remote.savedAt && state.savedAt && remote.savedAt < state.savedAt) {
      syncCfg.status = "idle";
      updateSyncUI();
      scheduleSyncSave();   // push the newer local state up to Gist
      return false;
    }

    const def = defaultState();
    state = {
      checks:       remote.checks       || {},
      notes:        remote.notes        || {},
      anki:         { ...def.anki, ...(remote.anki || {}) },
      ankiDaily:    remote.ankiDaily    || {},
      runs:         remote.runs         || {},
      exams:        remote.exams        || [],
      carsPassages: remote.carsPassages || [],
      overrides:    remote.overrides    || {},
      settings: {
        ...def.settings,
        ...(remote.settings || {}),
        completionMode: { ...def.settings.completionMode, ...((remote.settings && remote.settings.completionMode) || {}) },
      },
      savedAt:      remote.savedAt      || 0,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    syncCfg.status = "idle";
    syncCfg.error = "";
    syncCfg.last = new Date().toISOString();
    localStorage.setItem(SYNC_LAST_KEY, syncCfg.last);
    return true;
  } catch (e) {
    syncCfg.status = "error";
    syncCfg.error = e.message;
    updateSyncUI();
    return false;
  }
}

async function connectSync(token) {
  syncCfg.token = token.trim();
  localStorage.setItem(SYNC_TOKEN_KEY, syncCfg.token);
  syncCfg.status = "loading";
  updateSyncUI();
  try {
    const gistId = await findOrCreateGist();
    syncCfg.gistId = gistId;
    localStorage.setItem(SYNC_GIST_KEY, gistId);
    const pulled = await pullFromGist();
    if (!pulled) await pushToGist();
    render();
    return true;
  } catch (e) {
    syncCfg.status = "error";
    syncCfg.error = e.message;
    updateSyncUI();
    return false;
  }
}

function disconnectSync() {
  syncCfg = { token: "", gistId: "", last: "", status: "idle", error: "" };
  [SYNC_TOKEN_KEY, SYNC_GIST_KEY, SYNC_LAST_KEY].forEach(k => localStorage.removeItem(k));
  updateSyncUI();
}

function updateSyncUI() {
  const ind = document.getElementById("sync-indicator");
  if (ind) {
    if (!syncCfg.token) {
      ind.innerHTML = "";
    } else {
      const dot = { idle: "var(--check)", loading: "var(--accent)", saving: "var(--accent)", error: "var(--danger)" }[syncCfg.status];
      const label = { idle: "synced", loading: "syncing…", saving: "saving…", error: "sync error" }[syncCfg.status];
      ind.innerHTML = `<span style="color:${dot};">●</span> <span style="color:var(--muted);">${label}</span>`;
    }
  }
  const sp = document.getElementById("sync-panel");
  if (sp) { sp.outerHTML = buildSyncPanel(); wireSyncPanel(); }
}

function formatSyncTime(iso) {
  if (!iso) return "never";
  const d = new Date(iso);
  return d.toLocaleDateString("en-US", { month:"short", day:"numeric" })
    + " at " + d.toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" });
}

          Create a token with only the <code style="background:var(--bg); padding:1px 6px; border-radius:3px; font-size:11px;">gist</code> scope checked. Copy the token (starts with <code style="background:var(--bg); padding:1px 6px; border-radius:3px; font-size:11px;">ghp_</code>).

function wireSyncPanel() {
  const connectBtn = document.getElementById("sync-connect-btn");
  if (connectBtn) {
    connectBtn.onclick = async () => {
      const token = (document.getElementById("sync-token-input").value || "").trim();
      const msg = document.getElementById("sync-msg");
      if (!token) { msg.textContent = "Paste your token first."; return; }
      connectBtn.disabled = true;
      connectBtn.textContent = "Connecting…";
      msg.textContent = "";
      const ok = await connectSync(token);
      if (!ok) {
        connectBtn.disabled = false;
        connectBtn.textContent = "Connect";
        msg.textContent = syncCfg.error || "Connection failed.";
      }
    };
  }
  const pullBtn = document.getElementById("sync-pull-btn");
  if (pullBtn) pullBtn.onclick = async () => {
    const ok = await pullFromGist();
    if (ok) render(); else alert("Pull failed: " + syncCfg.error);
  };
  const pushBtn = document.getElementById("sync-push-btn");
  if (pushBtn) pushBtn.onclick = () => pushToGist();
  const discBtn = document.getElementById("sync-disconnect-btn");
  if (discBtn) discBtn.onclick = () => {
    if (!confirm("Disconnect sync? Your local data won't be affected.")) return;
    disconnectSync();
    render();
  };
}

// SCHEDULE OVERRIDES
// ============================================================
const DEFAULT_SLEEP = {
  MON: { bedtime: "22:00", wake: "05:45" },
  TUE: { bedtime: "22:30", wake: "07:00" },
  WED: { bedtime: "22:00", wake: "05:45" },
  THU: { bedtime: "22:00", wake: "05:45" },
  FRI: { bedtime: "22:00", wake: "05:45" },
  SAT: { bedtime: "22:00", wake: "06:30" },
  SUN: { bedtime: "22:00", wake: "07:00" },
};

function formatTime12(hhmm) {
  const [h, m] = hhmm.split(":").map(Number);
  const period = h < 12 ? "am" : "pm";
  const h12 = (h % 12) || 12;
  return `${h12}:${String(m).padStart(2, "0")} ${period}`;
}
function sleepDuration(bedtime, wake) {
  const [bh, bm] = bedtime.split(":").map(Number);
  const [wh, wm] = wake.split(":").map(Number);
  let mins = (wh * 60 + wm) - (bh * 60 + bm);
  if (mins < 0) mins += 1440;
  const h = Math.floor(mins / 60), mn = mins % 60;
  return mn === 0 ? `${h} h` : `${h} h ${mn} m`;
}
function formatSleepBlock(s) {
  return `${formatTime12(s.bedtime)} → ${formatTime12(s.wake)} · ${sleepDuration(s.bedtime, s.wake)}`;
}

// Returns the sleep object {bedtime, wake} in effect for a given date, considering overrides.
function resolvedSleepForDate(date) {
  const dow = DOW_LABELS[dayIdxFromISO(date)];
  const own = state.overrides[date];
  // 1. This day has its own sleep override
  if (own && own.sleep && own.sleep.scope === "day") return own.sleep;
  // 2. Most recent "forward" override on or before this date
  const fwd = Object.keys(state.overrides)
    .filter(d => d <= date && state.overrides[d].sleep && state.overrides[d].sleep.scope === "forward")
    .sort().reverse();
  if (fwd.length > 0) return state.overrides[fwd[0]].sleep;
  // 3. Schedule default
  return DEFAULT_SLEEP[dow];
}

// Returns the date string of the "forward" override affecting this date (if any, from an earlier date).
function inheritedForwardSleepFrom(date) {
  const fwd = Object.keys(state.overrides)
    .filter(d => d < date && state.overrides[d].sleep && state.overrides[d].sleep.scope === "forward")
    .sort().reverse();
  return fwd.length > 0 ? fwd[0] : null;
}

// Does this date have its own stored override (not inherited)?
function hasOwnOverride(date) {
  const o = state.overrides[date];
  return !!(o && (o.sleep || o.activity));
}

function setOverrideProp(date, key, value) {
  if (!state.overrides[date]) state.overrides[date] = {};
  if (value === null || value === undefined) {
    delete state.overrides[date][key];
    if (Object.keys(state.overrides[date]).length === 0) delete state.overrides[date];
  } else {
    state.overrides[date][key] = value;
  }
  saveState();
}

    renderToday();
  };

  // Activity toggle buttons — save immediately on click
  for (const btn of content.querySelectorAll(".act-btn")) {
    btn.onclick = () => {
      const type = btn.dataset.act;
      const existingNote = (state.overrides[viewDate] && state.overrides[viewDate].activity && state.overrides[viewDate].activity.note) || "";
      setOverrideProp(viewDate, "activity", type ? { type, note: existingNote } : null);

    };
  }

  // Activity note — auto-save on blur
  const noteEl = document.getElementById("ovr-act-note");
  if (noteEl) noteEl.addEventListener("change", () => {

    }
  });

  // Reset activity

  if (resetActBtn) resetActBtn.onclick = () => {

  };

  if (resetAllBtn) resetAllBtn.onclick = () => {

// ============================================================
// ANKI BACKLOG TRACKING
// New cards happen Mon/Wed/Thu/Fri/Sat. Sundays = reviews only.
// Tuesdays = no Anki. Missed cards roll forward and redistribute
// across remaining card-days in the week; any week-end deficit
// carries to the next week.
// ============================================================
const CARD_DAY_SET = new Set(["MON","WED","THU","FRI","SAT"]);
function isCardDay(iso) { return CARD_DAY_SET.has(DOW_LABELS[dayIdxFromISO(iso)]); }

function ankiDailyEntry(date, deckId) {
  return (state.ankiDaily[date] || {})[deckId] || 0;
}
function setAnkiDaily(date, deckId, value) {
  value = Math.max(0, Math.floor(value || 0));
  if (!state.ankiDaily[date]) state.ankiDaily[date] = {};
  if (value > 0) state.ankiDaily[date][deckId] = value;
  else delete state.ankiDaily[date][deckId];
  if (Object.keys(state.ankiDaily[date]).length === 0) delete state.ankiDaily[date];
  saveState();
}

const _cardDayCountCache = {};
function cardDayCountThrough(throughDate) {
  if (throughDate < SUMMER_START) return 0;
  const cap = throughDate > SUMMER_END ? SUMMER_END : throughDate;
  if (_cardDayCountCache[cap] !== undefined) return _cardDayCountCache[cap];
  let count = 0;
  let d = SUMMER_START;
  while (d <= cap) {
    if (isCardDay(d)) count++;
    d = addDays(d, 1);
  }
  _cardDayCountCache[cap] = count;
  return count;
}

// Cumulative cards completed for deck through end of given date
function ankiActualThrough(deckId, throughDate) {
  let sum = state.anki[deckId] || 0; // legacy baseline counts as already-done
  for (const d in state.ankiDaily) {
    if (d <= throughDate) sum += state.ankiDaily[d][deckId] || 0;
  }
  return sum;
}
function ankiActualTotal(deckId) { return ankiActualThrough(deckId, SUMMER_END); }

// Cumulative base target for deck through end of given date (capped at deck size)
function ankiBaseThrough(deckId, throughDate) {
  const deck = ANKI_DECKS.find(d => d.id === deckId);
  return Math.min(deck.total, cardDayCountThrough(throughDate) * deck.perDay);
}

// Signed backlog through end of date: positive = behind, negative = ahead
function ankiBacklog(deckId, throughDate) {
  return ankiBaseThrough(deckId, throughDate) - ankiActualThrough(deckId, throughDate);
}

// Today's adjusted target = base + share of (carried backlog + within-week deficit), redistributed over remaining card-days of the week. Only positive backlog redistributes; being ahead doesn't reduce future targets.
function ankiAdjustedTarget(deckId, date) {
  const deck = ANKI_DECKS.find(d => d.id === deckId);
  if (date < SUMMER_START || date > SUMMER_END) return 0;
  if (!isCardDay(date)) return 0;
  const week = findWeek(date);
  if (!week) return deck.perDay;

  // Card-days in this week (Mon, Wed, Thu, Fri, Sat)
  const weekDays = [];
  for (let i = 0; i < 7; i++) {
    const d = addDays(week.start, i);
    if (isCardDay(d)) weekDays.push(d);
  }
  const totalWeekBase = weekDays.length * deck.perDay;

  // Positive backlog carried from prior weeks
  const dayBeforeWeek = addDays(week.start, -1);
  const carry = dayBeforeWeek >= SUMMER_START ? Math.max(0, ankiBacklog(deckId, dayBeforeWeek)) : 0;

  // Actual completed this week through yesterday
  let actualSoFar = 0;
  for (const d of weekDays) {
    if (d < date) actualSoFar += ankiDailyEntry(d, deckId);
  }

  // Remaining card-days in this week including today
  const remainingDays = weekDays.filter(d => d >= date).length;
  if (remainingDays === 0) return 0;

  const totalRemainingWork = totalWeekBase + carry - actualSoFar;
  const target = Math.round(totalRemainingWork / remainingDays);

  // Cap by cards still left in this deck
  const done = ankiActualThrough(deckId, addDays(date, -1));
  const cardsLeft = Math.max(0, deck.total - done);
  return Math.max(0, Math.min(target, cardsLeft));
}

function formatBacklog(n) {
  if (n > 0) return `<span style="color:var(--danger); font-weight:600;">${n} behind</span>`;
  if (n < 0) return `<span style="color:var(--check); font-weight:600;">${Math.abs(n)} ahead</span>`;
  return `<span style="color:var(--muted);">on track</span>`;
}

// Shared Anki check-in panel — used on Today tab and Anki tab
function ankiCheckinPanelHTML(viewDate) {
  const isCard = isCardDay(viewDate);
  const dow = DOW_LABELS[dayIdxFromISO(viewDate)];

  let totalActual = 0, totalTarget = 0, totalBacklogBefore = 0;
  const rows = ANKI_DECKS.map(deck => {
    const target = ankiAdjustedTarget(deck.id, viewDate);
    const actual = ankiDailyEntry(viewDate, deck.id);
    const backlogBefore = ankiBacklog(deck.id, addDays(viewDate, -1));
    totalActual += actual;
    totalTarget += target;
    totalBacklogBefore += backlogBefore;
    return { deck, target, actual, backlogBefore };
  });

  // Out-of-range dates: simple read-only message
  if (!isCard && dow !== "TUE" && dow !== "SUN") {
    return `
      <div class="panel">
        <h2>Anki · ${dow} ${shortDate(viewDate)}</h2>
        <div class="hint">Outside summer plan range. Backlog carrying: ${formatBacklog(totalBacklogBefore)}.</div>
      </div>
    `;
  }

  // Tuesday + Sunday: no target, but allow logging bonus/review cards
  const isTuesday = dow === "TUE";
  const isSunday  = dow === "SUN";
  const isBonusDay = isTuesday || isSunday;

  const rowsHtml = rows.map(({ deck, target, actual, backlogBefore }) => {
    const backlogAfter = isBonusDay
      ? backlogBefore - actual
      : backlogBefore + deck.perDay - actual;
    const extra = target - deck.perDay;
    const extraTag = extra > 0 ? ` <span class="hint" style="color:var(--gold);">+${extra}</span>` : "";
    const targetStyle = extra > 0 ? 'style="color:var(--gold); font-weight:700;"' : "";
    return `
      <tr>
        <td><span style="display:inline-block; width:10px; height:10px; background:${deck.color}; border-radius:2px; margin-right:8px; vertical-align:middle;"></span><strong>${deck.name}</strong></td>
        <td style="color:var(--muted);">${isBonusDay ? "—" : deck.perDay}</td>
        <td ${targetStyle}>${isBonusDay ? "—" : target + extraTag}</td>
        <td><input type="number" min="0" max="999" data-checkin-deck="${deck.id}" data-checkin-date="${viewDate}" value="${actual || ""}" placeholder="0" style="width:72px;"></td>
        <td>${formatBacklog(backlogAfter)}</td>
      </tr>
    `;
  }).join("");

  const totalExtra = totalTarget - ANKI_PER_DAY;
  const totalBacklogAfter = isBonusDay
    ? totalBacklogBefore - totalActual
    : totalBacklogBefore + ANKI_PER_DAY - totalActual;
  const totalExtraTag = totalExtra > 0 ? ` <span class="hint" style="color:var(--gold);">+${totalExtra}</span>` : "";
  const totalStyle = totalExtra > 0 ? 'style="color:var(--gold); font-weight:700;"' : "";

  const panelTitle = isTuesday
    ? `Anki Bonus Log · TUE ${shortDate(viewDate)}`
    : isSunday
      ? `Anki Review Day · SUN ${shortDate(viewDate)}`
      : `Anki Check-in · ${dow} ${shortDate(viewDate)}`;
  const bonusHint = isTuesday
    ? `National Soren Day — no target. Anything you log is a bonus and counts toward your running backlog.`
    : isSunday
      ? `Sunday review day — no new-card target. Log any cards you do and they'll count toward your backlog.`
      : "";

  return `
    <div class="panel">
      <h2>${panelTitle}</h2>
      ${bonusHint ? `<div class="hint" style="margin-bottom:12px;">${bonusHint}</div>` : ""}
      <div class="table-scroll">
      <table class="run-table">
        <thead><tr><th>Deck</th><th>Base</th><th>Today's Target</th><th>Done</th><th>Backlog After</th></tr></thead>
        <tbody>${rowsHtml}</tbody>
        <tfoot>
          <tr style="border-top:2px solid var(--border-2);">
            <td><strong>TOTAL</strong></td>
            <td style="color:var(--muted);"><strong>${ANKI_PER_DAY}</strong></td>
            <td ${totalStyle}><strong>${totalTarget}</strong>${totalExtraTag}</td>
            <td><strong>${totalActual}</strong></td>
            <td><strong>${formatBacklog(totalBacklogAfter)}</strong></td>
          </tr>
        </tfoot>
      </table>
      </div>
      <div class="row" style="margin-top:10px;">
        ${isBonusDay ? "" : `<button class="btn btn-sm" data-anki-action="fill-all" data-date="${viewDate}">Hit all targets</button>`}
        <button class="btn btn-sm btn-ghost" data-anki-action="clear" data-date="${viewDate}">Clear day</button>
        <div class="hint" style="margin-left:auto;">${isBonusDay ? "Bonus cards count toward your backlog." : "Missed cards redistribute across remaining card-days this week (Mon · Wed · Thu · Fri · Sat)."}</div>
      </div>
    </div>
  `;
}

function wireUpAnkiCheckin(viewDate, rerender) {
  // Capture focus before re-render to restore after
  function withFocusPreserved(fn) {
    const ae = document.activeElement;
    const info = ae && ae.dataset && ae.dataset.checkinDeck
      ? { deckId: ae.dataset.checkinDeck, date: ae.dataset.checkinDate }
      : null;
    fn();
    if (info) {
      const sel = `input[data-checkin-deck="${info.deckId}"][data-checkin-date="${info.date}"]`;
      const el = document.querySelector(sel);
      if (el) { el.focus(); el.select(); }
    }
  }
  for (const inp of content.querySelectorAll("input[data-checkin-deck]")) {
    inp.addEventListener("change", () => {
      const deckId = inp.dataset.checkinDeck;
      const date = inp.dataset.checkinDate;
      setAnkiDaily(date, deckId, parseInt(inp.value) || 0);
      withFocusPreserved(rerender);
    });
  }
  for (const btn of content.querySelectorAll("button[data-anki-action]")) {
    btn.addEventListener("click", () => {
      const action = btn.dataset.ankiAction;
      const date = btn.dataset.date;
      if (action === "fill-all") {
        for (const d of ANKI_DECKS) setAnkiDaily(date, d.id, ankiAdjustedTarget(d.id, date));
      } else if (action === "clear") {
        if (!confirm("Clear this day's Anki check-in?")) return;
        for (const d of ANKI_DECKS) setAnkiDaily(date, d.id, 0);
      }
      rerender();
    });
  }
}

// ============================================================
// THEME (light / dark)
// ============================================================
const THEME_KEY = "summer2026_theme";
function getInitialTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved === "light" || saved === "dark") return saved;
  if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) return "dark";
  return "light";
}
function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute("content", theme === "dark" ? "#161310" : "#F5EFE0");
}
function setTheme(theme, animate = true, originEvent = null) {
  // Origin = center of the toggle button (where the wave "comes out")
  let originX, originY;
  const btn = document.getElementById("theme-toggle");
  if (btn) {
    const r = btn.getBoundingClientRect();
    originX = r.left + r.width / 2;
    originY = r.top + r.height / 2;
  } else {
    originX = window.innerWidth - 32;
    originY = 32;
  }

  const prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const supportsVT = typeof document.startViewTransition === "function";

  if (!animate || prefersReduced) {
    applyTheme(theme);
    localStorage.setItem(THEME_KEY, theme);
    return;
  }

  // Wire the CSS mask's conic-gradient origin to the button corner.
  document.documentElement.style.setProperty("--theme-origin-x", originX + "px");
  document.documentElement.style.setProperty("--theme-origin-y", originY + "px");

  const wobble = () => {
    if (!btn) return;
    btn.classList.add("toggling");
    setTimeout(() => btn.classList.remove("toggling"), 650);
  };

  if (supportsVT) {
    document.documentElement.classList.add("theme-transitioning");
    const transition = document.startViewTransition(() => {
      applyTheme(theme);
      localStorage.setItem(THEME_KEY, theme);
    });
    transition.finished.finally(() => {
      document.documentElement.classList.remove("theme-transitioning");
    });
  } else {
    // Fallback: solid-bg overlay with the same radial bloom mask.
    const newBg = theme === "dark" ? "#161310" : "#F5EFE0";
    const overlay = document.createElement("div");
    overlay.className = "theme-sweep-fallback";
    overlay.style.background = newBg;
    document.body.appendChild(overlay);
    setTimeout(() => {
      applyTheme(theme);
      localStorage.setItem(THEME_KEY, theme);
    }, 500);
    setTimeout(() => overlay.remove(), 750);
  }

  wobble();
}
// apply immediately so there's no flash
applyTheme(getInitialTheme());
document.documentElement.setAttribute("data-tab", currentTab);
document.getElementById("theme-toggle").addEventListener("click", (e) => {
  const cur = document.documentElement.getAttribute("data-theme") || "light";
  setTheme(cur === "dark" ? "light" : "dark", true, e);
});

// LAUNCH PREVIEW — freeze the launch overlay in place so the

function setLaunchPreview(on) {
  const body = document.body;
  const btn = document.getElementById("launch-preview-btn");
  let overlay = document.getElementById("launch-overlay");
  if (on) {
    // If the launch overlay has already been removed (after first launch),
    // re-create it from a stored template so preview still works.
    if (!overlay) {
      overlay = document.createElement("div");
      overlay.id = "launch-overlay";
      overlay.className = "launch-overlay";
      overlay.setAttribute("aria-hidden", "true");
      overlay.innerHTML = `
        <div class="launch-logo">
          <div class="launch-title">
            <span class="launch-master">Master</span><span class="launch-plan">Plan.</span><svg class="launch-scribble" viewBox="0 0 56 36" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M4 22 C 12 10, 24 8, 36 14 S 50 26, 52 18"/></svg>
          </div>
          <div class="launch-companion">Companion</div>
        </div>`;
      document.body.prepend(overlay);
    }
    body.classList.add("preview-launch");

    body.classList.remove("preview-launch");

document.getElementById("launch-preview-btn").addEventListener("click", () => {

// ============================================================
// DYNAMIC HERO TITLE — "Master ____" by tab
// ============================================================
const TAB_TITLES = {
  today:     "Today.",
  week:      "Week.",
  anki:      "Anki.",
  running:   "Running.",
  mcat:      "MCAT Exams.",
  dashboard: "Plan.",  // special — dashboard reads as "Master Plan."
  settings:  "Setup.",
};
// Re-play the scribble's stroke-draw animation. Uses WAAPI so it can be
// restarted reliably every tab switch (CSS class toggling + reflow tricks
// are flaky for SVG path animations across browsers).
let _scribbleAnim = null;
function replayScribble() {
  if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const path = document.querySelector("#hero-title .scribble path");
  if (!path) return;
  try {
    if (_scribbleAnim) _scribbleAnim.cancel();
    _scribbleAnim = path.animate(
      [
        { strokeDashoffset: 120 },
        { strokeDashoffset: 0 }
      ],
      {
        duration: 700,
        easing: "cubic-bezier(0.65, 0, 0.35, 1)",
        fill: "both"
      }
    );
  } catch (e) { /* WAAPI unsupported — leave the static stroke in place */ }
}

function updateHeroTitle(animate) {
  const el = document.querySelector("#hero-title .title-dynamic");
  if (!el) return;
  const next = TAB_TITLES[currentTab] || "Plan.";
  if (el.textContent === next) return;
  if (!animate || document.body.classList.contains("launching")) {
    el.textContent = next;
    return;
  }
  el.classList.remove("swap-in", "swap-out");
  // force reflow so removing+re-adding the class restarts the animation
  void el.offsetWidth;
  el.classList.add("swap-out");
  setTimeout(() => {
    el.textContent = next;
    el.classList.remove("swap-out");
    void el.offsetWidth;
    el.classList.add("swap-in");
    // Re-play the scribble draw in sync with the new title arriving
    replayScribble();
  }, 200);
}

// ============================================================
// LAUNCH ANIMATION — runs once on first load
// ============================================================
function playLaunchAnimation() {
  const body = document.body;
  // Remove the overlay element after its animation finishes so it can't block
  // any later interactions or get re-played on tab change.
  const overlay = document.getElementById("launch-overlay");
  if (overlay) {
    setTimeout(() => overlay.remove(), 2400);
  }
  // Double-rAF: first rAF = browser has received the frame request;
  // second rAF = layout+paint for this frame is committed. This guarantees
  // the overlay is already rendered at its correct full-screen position before
  // the CSS keyframe animations on the logo children begin. Replaces the
  // old setTimeout(..., 20) which could fire before the first paint on iOS.
  requestAnimationFrame(() => requestAnimationFrame(() => {
    body.classList.remove("launching");
    body.classList.add("launched");
    setTimeout(() => body.classList.remove("launched"), 3200);
  }));
}

let _replayTabAnim = false;
function runTabEntryAnimation() {
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  // Subtle staggered slide-up — no opacity change, so content stays visible
  // even if WAAPI is throttled/pending (no risk of an invisible UI).
  const kids = Array.from(content.children);
  requestAnimationFrame(() => {
    kids.forEach((el, i) => {
      try {
        el.animate(
          [
            { transform: 'translateY(12px)' },
            { transform: 'translateY(0)' }
          ],
          {
            duration: 420,
            delay: i * 45,
            easing: 'cubic-bezier(0.16, 1, 0.3, 1)',
            fill: 'none'

function renderCountdown() {

// ============================================================
// HAPTIC FEEDBACK
// iOS Safari never implemented navigator.vibrate(), so we use a
// hidden <input type="checkbox"> — programmatically clicking it
// fires the Taptic Engine's selection feedback via UIKit.
// Android/Chrome gets the Vibration API instead.
// style: 'light' | 'medium' (default) | 'heavy'
// ============================================================
function triggerHaptic(style) {
  // Android / Chrome
  if (navigator.vibrate) {
    try { navigator.vibrate(style === 'light' ? 5 : style === 'heavy' ? 28 : 12); } catch (_) {}
    return;
  }
  // iOS Safari — checkbox state-change → Taptic Engine selection haptic
  try {
    if (!window._hapticEl) {
      const el = document.createElement('input');
      el.type = 'checkbox';
      el.style.cssText = 'position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;top:-200px;left:-200px;';
      document.body.appendChild(el);
      window._hapticEl = el;
    }
    window._hapticEl.click(); // toggle → haptic fires
    if (style === 'heavy') {
      // Double-tap feel: fire a second click ~40 ms later
      setTimeout(() => { try { window._hapticEl.click(); } catch (_) {} }, 40);
    }
  } catch (_) {}
}

// ============================================================
// TASK COMPLETION MODE (tap vs swipe, per device class)
// ============================================================
function isTouchDevice() {
  return !!(window.matchMedia && window.matchMedia('(hover: none) and (pointer: coarse)').matches);
}
function getCompletionMode() {
  const pref = (state.settings && state.settings.completionMode) || { mobile: "swipe", desktop: "tap" };
  return isTouchDevice() ? pref.mobile : pref.desktop;
}

// Attach a "swipe right to complete" gesture, à la iPhone slide-to-answer.

// `onComplete` fires once the user releases past the threshold.
function attachSwipeToComplete(row, onComplete) {

  if (!task) return;

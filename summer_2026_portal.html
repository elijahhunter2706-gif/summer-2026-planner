<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
<title>Summer 2026 · Master Plan Portal</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Summer26">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="theme-color" content="#F5EFE0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

:root {
  --paper:      #F5EFE0;
  --paper-2:    #FBF6E8;
  --paper-3:    #FFFCF3;
  --ink:        #2A261D;
  --ink-2:      #534D40;
  --muted:      #8A8275;
  --dim:        #B5AE9F;
  --border:     rgba(42, 38, 29, 0.08);
  --border-2:   rgba(42, 38, 29, 0.18);

  --butter:        #FFD874;
  --butter-soft:   #FFEBA6;
  --peach:         #FFB48A;
  --peach-soft:    #FFD7BB;
  --blush:         #F4A7BE;
  --blush-soft:    #FCD3DD;
  --lavender:      #BBADE7;
  --lavender-soft: #DFD7F1;
  --sky:           #92C4E6;
  --sky-soft:      #C6E0EF;
  --mint:          #9BD3A3;
  --mint-soft:     #CFEAD2;
  --coral:         #EE7E5F;
  --indigo:        #4A5BAE;

  --success:    #5C9F58;
  --warn:       #C68A2F;
  --danger:     #DC5F65;

  --shadow-xs:  0 1px 2px rgba(42, 38, 29, 0.06);
  --shadow-sm:  0 2px 8px rgba(42, 38, 29, 0.06);
  --shadow:     0 10px 28px -8px rgba(42, 38, 29, 0.18);
  --shadow-lg:  0 24px 48px -12px rgba(42, 38, 29, 0.22);

  --r-xs: 8px;
  --r-sm: 12px;
  --r:    18px;
  --r-lg: 24px;
  --r-xl: 32px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

header.hero {
  position: relative;
  padding: 32px clamp(16px, 4vw, 32px) 18px;
  z-index: 1;
  max-width: 1280px;
  margin: 0 auto;
}
.hero-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  flex-wrap: wrap;
  gap: 24px;
}
.hero-title-wrap {
  position: relative;
  flex: 1 1 auto;
  min-width: 0;
}
.hero-eyebrow {
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 2.4px;
  font-weight: 700;
  margin-bottom: 4px;
}
h1 {
  font-family: 'Instrument Serif', Georgia, serif;
  font-weight: 400;
  font-size: clamp(40px, 8vw, 72px);
  line-height: 0.95;
  letter-spacing: -0.025em;
  color: var(--ink);
  position: relative;
  display: block;
  white-space: nowrap;
}
h1 .accent { font-style: italic; color: var(--coral); }
.scribble {
  display: inline-block;
  margin-left: 14px;
  width: clamp(36px, 5vw, 56px);
  height: clamp(24px, 3.4vw, 36px);
  pointer-events: none;
  color: var(--coral);
  vertical-align: 0.35em;
}
.subtitle {
  color: var(--ink-2);
  font-size: 14px;
  margin-top: 10px;
  max-width: 460px;
}
#sync-indicator { margin-top: 8px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }

.countdown { display: flex; gap: 10px; }
.cd-item {
  background: var(--paper-3);
  border-radius: var(--r);
  padding: 12px 18px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  min-width: 100px;
}
.cd-item:nth-child(1) { background: var(--butter-soft); }
.cd-item:nth-child(2) { background: var(--peach-soft); }
.cd-num {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 36px;
  font-weight: 400;
  line-height: 1;
  color: var(--ink);
}
.cd-label {
  font-size: 9.5px;
  color: var(--ink-2);
  text-transform: uppercase;
  letter-spacing: 1.4px;
  font-weight: 700;
  margin-top: 6px;
}

nav.tabs {
  display: flex;
  gap: 4px;
  margin: 8px auto 0;
  max-width: 1232px;
  padding: 6px;
  background: var(--paper-3);
  border-radius: 999px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
  position: relative;
  z-index: 2;
  margin-left: clamp(8px, 2.5vw, 24px);
  margin-right: clamp(8px, 2.5vw, 24px);
}
nav.tabs::-webkit-scrollbar { display: none; }
.tabs button {
  background: transparent;
  border: none;
  border-radius: 999px;
  padding: 11px 18px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-2);
  cursor: pointer;
  transition: color 0.2s, background 0.35s cubic-bezier(0.4,0,0.2,1), transform 0.35s cubic-bezier(0.4,0,0.2,1), box-shadow 0.35s;
  white-space: nowrap;
  flex-shrink: 0;
  position: relative;
}
.tabs button:hover { color: var(--ink); }
.tabs button.active {
  color: var(--ink);
  font-weight: 700;
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}
.tabs button[data-tab="today"].active     { background: var(--butter); }
.tabs button[data-tab="week"].active      { background: var(--lavender-soft); }
.tabs button[data-tab="anki"].active      { background: var(--blush-soft); }
.tabs button[data-tab="running"].active   { background: var(--mint-soft); }
.tabs button[data-tab="mcat"].active      { background: var(--peach-soft); }
.tabs button[data-tab="dashboard"].active { background: var(--sky-soft); }

main {
  padding: 20px clamp(12px, 2.5vw, 24px) 64px;
  max-width: 1280px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}
#content { position: relative; }
@media (prefers-reduced-motion: reduce) {
  /* JS animations are skipped automatically when this matches */
}

.panel {
  background: var(--paper-3);
  border-radius: var(--r-lg);
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  position: relative;
}
.panel h2 {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 28px;
  font-weight: 400;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin-bottom: 16px;
  text-transform: none;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.panel h2 select {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
}
.panel h3 {
  font-size: 10.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.6px;
  color: var(--muted);
  margin-bottom: 10px;
}

.today-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}
.today-header > div:first-child { flex: 1 1 280px; min-width: 0; }
.today-header > .row { flex: 0 1 auto; }
.today-date {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 40px;
  font-weight: 400;
  line-height: 1;
  letter-spacing: -0.02em;
}
.today-day {
  color: var(--ink-2);
  margin-top: 8px;
  font-size: 13.5px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.day-badge {
  padding: 6px 14px;
  border-radius: 999px;
  font-weight: 700;
  font-size: 10.5px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--ink);
  background: var(--butter);
}
.badge-mon, .badge-wed, .badge-fri { background: var(--mint); }
.badge-tue { background: var(--blush); }
.badge-thu { background: var(--peach); }
.badge-sat { background: var(--butter); }
.badge-sun { background: var(--sky); }

.progress-pill {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--paper-2);
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
}
.mini-bar {
  width: 130px;
  height: 6px;
  background: rgba(42,38,29,0.08);
  border-radius: 999px;
  overflow: hidden;
}
.mini-bar-fill {
  height: 100%;
  background: var(--success);
  transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  border-radius: 999px;
}

.task-list { display: flex; flex-direction: column; gap: 10px; }
.task {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 22px;
  border-radius: var(--r);
  cursor: pointer;
  user-select: none;
  transition: transform 0.25s cubic-bezier(0.16,1,0.3,1), box-shadow 0.25s, opacity 0.2s;
  position: relative;
  overflow: hidden;
  background: var(--butter-soft);
  border: 1px solid rgba(42, 38, 29, 0.06);
  min-height: 60px;
}
.task::after {
  content: "";
  position: absolute;
  right: 22px; top: 50%;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--butter);
  transform: translateY(-50%);
  opacity: 0.9;
}
.task:hover {
  transform: translateY(-3px) rotate(-0.4deg);
  box-shadow: var(--shadow);
}
.task:active { transform: translateY(-1px) scale(0.995); }

.task[data-cat="run"]            { background: var(--mint-soft); }
.task[data-cat="run"]::after     { background: var(--mint); }
.task[data-cat="stretch"]        { background: var(--sky-soft); }
.task[data-cat="stretch"]::after { background: var(--sky); }
.task[data-cat="program"]        { background: var(--lavender-soft); }
.task[data-cat="program"]::after { background: var(--lavender); }
.task[data-cat="mcat"]           { background: var(--peach-soft); }
.task[data-cat="mcat"]::after    { background: var(--peach); }
.task[data-cat="anki"]           { background: var(--blush-soft); }
.task[data-cat="anki"]::after    { background: var(--blush); }
.task[data-cat="exam"]           { background: var(--butter-soft); }
.task[data-cat="exam"]::after    { background: var(--butter); }
.task[data-cat="examreview"]     { background: var(--peach-soft); }
.task[data-cat="examreview"]::after { background: var(--peach); }
.task[data-cat="rest"]           { background: var(--paper-2); border: 1px dashed var(--coral); }
.task[data-cat="rest"]::after    { background: var(--coral); }

.task.done { opacity: 0.55; }
.task.done .task-label { text-decoration: line-through; text-decoration-thickness: 1.5px; }
.checkbox {
  width: 28px;
  height: 28px;
  border: 2.5px solid var(--ink);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  background: var(--paper-3);
  transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
}
.task.done .checkbox {
  background: var(--ink);
  border-color: var(--ink);
  transform: scale(1.05);
}
.task.done .checkbox::after {
  content: "✓";
  color: var(--paper);
  font-weight: 700;
  font-size: 16px;
  line-height: 1;
}
.task-content { flex: 1; min-width: 0; padding-right: 32px; }
.task-label { font-size: 16px; font-weight: 600; color: var(--ink); line-height: 1.3; }
.task-meta { color: var(--ink-2); font-size: 12px; }
.task.overridden { opacity: 0.5; }
.task.overridden .task-label { text-decoration: line-through; color: var(--muted); }
.task-override-note { font-size: 11.5px; color: var(--danger); margin-top: 4px; font-weight: 600; }

.cutback-banner {
  background: var(--butter);
  color: var(--ink);
  padding: 12px 18px;
  border-radius: var(--r);
  font-size: 13.5px;
  font-weight: 600;
  margin-bottom: 14px;
}
.override-banner {
  padding: 11px 16px;
  border-radius: var(--r);
  font-size: 13.5px;
  font-weight: 600;
  margin-bottom: 12px;
}
.override-banner.skip { background: var(--blush-soft); color: #8B2F3D; }
.override-banner.rest { background: var(--sky-soft); color: var(--indigo); }
.override-indicator {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--butter);
  color: var(--ink);
  padding: 3px 10px; border-radius: 999px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
}

.btn {
  background: var(--ink);
  color: var(--paper-3);
  border: none;
  padding: 11px 18px;
  border-radius: 999px;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  min-height: 42px;
}
.btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.btn:active { transform: translateY(0); }
.btn.btn-sm { padding: 8px 14px; font-size: 12px; min-height: 36px; }
.btn-ghost {
  background: var(--paper-3);
  color: var(--ink);
  border: 1px solid var(--border-2);
}
.btn-ghost:hover { background: var(--paper-2); }

select, input[type="text"], input[type="number"], input[type="date"], input[type="time"], input[type="password"] {
  background: var(--paper-3);
  color: var(--ink);
  border: 1px solid var(--border-2);
  padding: 9px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-family: inherit;
  font-weight: 500;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input[type="date"], input[type="time"] { padding: 8px 12px; }
input[type="number"] { padding: 9px 12px; }
select:focus, input:focus, textarea:focus {
  outline: none;
  border-color: var(--ink);
  box-shadow: 0 0 0 3px rgba(42,38,29,0.06);
}
textarea.notes {
  width: 100%;
  min-height: 80px;
  background: var(--paper-2);
  border: 1px solid var(--border);
  color: var(--ink);
  padding: 14px 16px;
  border-radius: var(--r);
  font-family: inherit;
  font-size: 14px;
  resize: vertical;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.resource-links { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.resource-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--mint-soft);
  border: 1px solid var(--border);
  color: var(--ink);
  text-decoration: none;
  padding: 11px 16px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  transition: transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
}
.resource-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
.resource-icon {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--mint);
  color: var(--ink);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px;
}
.resource-dur { color: var(--ink-2); font-size: 11.5px; font-weight: 500; }

.sleep-block {
  background: var(--sky-soft);
  padding: 14px 18px;
  border-radius: var(--r);
  font-size: 14px;
  color: var(--ink);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.sleep-block strong { font-weight: 700; }

.week-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 10px;
}
.week-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
}
@media (max-width: 1100px) { .week-grid { grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 700px)  { .week-grid { grid-template-columns: repeat(2, 1fr); } }
.day-card {
  background: var(--paper-2);
  border-radius: var(--r);
  padding: 14px;
  min-height: 240px;
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border);
  transition: transform 0.2s, box-shadow 0.2s;
}
.day-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
.day-card.today {
  background: var(--butter-soft);
  border-color: var(--butter);
  box-shadow: 0 0 0 2px var(--butter), var(--shadow);
}
.day-card.cutback { background: var(--peach-soft); }
.day-card-header {
  font-weight: 700;
  font-size: 12px;
  padding-bottom: 10px;
  border-bottom: 1px dashed var(--border-2);
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--ink-2);
  letter-spacing: 0.5px;
}
.day-tasks { display: flex; flex-direction: column; gap: 7px; flex: 1; }
.mini-task {
  display: flex; align-items: flex-start; gap: 7px;
  font-size: 11.5px; color: var(--ink); cursor: pointer;
  line-height: 1.35; padding: 3px 0;
  font-weight: 500;
}
.mini-task:hover { color: var(--coral); }
.mini-task.done { color: var(--muted); }
.mini-task.done span { text-decoration: line-through; }
.mini-check {
  width: 14px; height: 14px;
  border: 1.8px solid var(--ink-2);
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 2px;
  background: var(--paper-3);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.mini-task.done .mini-check {
  background: var(--ink);
  border-color: var(--ink);
}
.mini-task.done .mini-check::after {
  content: "✓";
  color: var(--paper-3);
  font-size: 9px;
  font-weight: bold;
  line-height: 1;
}
.week-ovr-dot {
  display: inline-block; width: 8px; height: 8px;
  background: var(--coral); border-radius: 50%;
  margin-left: 6px; vertical-align: middle;
}

.anki-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 14px;
}
.deck {
  background: var(--paper-2);
  border-radius: var(--r);
  padding: 18px;
  border: 1px solid var(--border);
  position: relative;
  transition: transform 0.2s, box-shadow 0.2s;
}
.deck:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
.deck::before {
  content: "";
  position: absolute;
  top: 20px; right: 20px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--deck-color, var(--coral));
}
.deck-name { font-weight: 700; font-size: 17px; padding-right: 26px; }
.deck-stats { color: var(--muted); font-size: 11.5px; margin-top: 2px; }
.deck-progress {
  height: 8px;
  background: rgba(42,38,29,0.08);
  border-radius: 999px;
  overflow: hidden;
  margin: 14px 0 10px;
}
.deck-progress-bar {
  height: 100%;
  border-radius: 999px;
  transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
.deck-numbers { display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 13px; }

.bubble-chart {
  position: relative;
  min-height: 260px;
  margin: 14px 0 8px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 4px;
  flex-wrap: wrap;
  padding: 12px;
  background: var(--paper-2);
  border-radius: var(--r);
}
.bubble {
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: var(--ink);
  font-weight: 700;
  text-align: center;
  padding: 6px;
  position: relative;
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
  cursor: default;
  box-shadow: inset 0 -10px 18px rgba(42,38,29,0.08);
  line-height: 1.05;
  flex-shrink: 0;
}
.bubble:hover { transform: translateY(-4px) scale(1.04); }
.bubble-label { font-size: 13px; font-weight: 700; padding: 0 4px; }
.bubble-sub { font-size: 10.5px; font-weight: 600; opacity: 0.7; margin-top: 3px; }

.run-table { width: 100%; border-collapse: separate; border-spacing: 0; }
.run-table th, .run-table td {
  padding: 12px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  vertical-align: middle;
}
.run-table th {
  color: var(--muted);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 700;
}
.run-table tr.cutback td { background: var(--peach-soft); }
.run-table tr.today-row td { background: var(--butter-soft); }
.run-table input[type="number"], .run-table input[type="text"] { padding: 7px 12px; font-size: 13px; }
.bar {
  background: rgba(42,38,29,0.08);
  height: 18px;
  border-radius: 999px;
  overflow: hidden;
  position: relative;

<header class="hero">
  <div class="hero-row">
    <div class="hero-title-wrap">
      <div class="hero-eyebrow">Summer 2026</div>
      <h1>Master <span class="accent">Plan.</span><svg class="scribble" viewBox="0 0 56 36" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M4 22 C 12 10, 24 8, 36 14 S 50 26, 52 18"/><path d="M40 4 L 46 10"/><path d="M44 4 L 50 8"/></svg></h1>

  </div>

<main id="content"></main>

<script>
// ============================================================
// SCHEDULE DATA — from the Summer 2026 Master Planner PDFs
// plan = [MON, TUE, WED, THU, FRI, SAT, SUN]
// numeric = miles (run); string = cross-train; null = rest
// ============================================================
const WEEKS = [
  { id:1,  label:"Pre Wk 1",  start:"2026-05-18", total:10, cutback:false, program:false, plan:[2.5,null,2.5,"Bike 30m",1.5,3.5,null] },
  { id:2,  label:"Pre Wk 2",  start:"2026-05-25", total:11, cutback:false, program:false, plan:[2.5,null,2.5,"Swim 30m",2.0,4.0,null] },
  { id:3,  label:"Pre Wk 3",  start:"2026-06-01", total:12, cutback:false, program:false, plan:[3.0,null,2.5,"Bike 35m",2.5,4.0,null] },
  { id:4,  label:"Prog Wk 1", start:"2026-06-08", total:13, cutback:false, program:true,  plan:[3.0,null,3.0,"Swim 30m",2.5,4.5,null] },
  { id:5,  label:"Prog Wk 2", start:"2026-06-15", total:15, cutback:false, program:true,  plan:[3.5,null,3.5,"Bike 35m",3.0,5.0,null] },
  { id:6,  label:"Prog Wk 3", start:"2026-06-22", total:16, cutback:false, program:true,  plan:[4.0,null,3.5,"Swim 35m",3.0,5.5,null] },
  { id:7,  label:"Prog Wk 4", start:"2026-06-29", total:12, cutback:true,  program:true,  plan:[3.0,null,2.5,"Bike 25m",2.5,4.0,null] },
  { id:8,  label:"Prog Wk 5", start:"2026-07-06", total:17, cutback:false, program:true,  plan:[4.0,null,3.5,"Swim 40m",3.5,6.0,null] },
  { id:9,  label:"Prog Wk 6", start:"2026-07-13", total:19, cutback:false, program:true,  plan:[4.5,null,4.5,"Bike 45m",3.5,6.5,null] },
  { id:10, label:"Prog Wk 7", start:"2026-07-20", total:21, cutback:false, program:true,  plan:[5.0,null,5.0,"Swim 45m",4.0,7.0,null] },
  { id:11, label:"Prog Wk 8", start:"2026-07-27", total:16, cutback:true,  program:true,  plan:[4.0,null,3.5,"Bike 30m",3.0,5.5,null] },
];

const DOW_LABELS = ["MON","TUE","WED","THU","FRI","SAT","SUN"];
const DOW_FULL = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

const ANKI_DECKS = [
  { id:"behavioral", name:"Behavioral", total:827, perDay:11, color:"#a64dff", est:"Aug 1" },
  { id:"biochem",    name:"Biochem",    total:515, perDay:7,  color:"#ff8c42", est:"Jul 30" },
  { id:"biology",    name:"Biology",    total:604, perDay:8,  color:"#4ecb71", est:"Aug 1" },
  { id:"equations",  name:"Equations",  total:91,  perDay:1,  color:"#ffd93d", est:"Aug 17" },
  { id:"genchem",    name:"Gen Chem",   total:250, perDay:3,  color:"#4dd9ff", est:"Aug 9" },
  { id:"ochem",      name:"Ochem",      total:287, perDay:4,  color:"#ff4d6d", est:"Jul 28" },
  { id:"physmath",   name:"Phys/Math",  total:313, perDay:4,  color:"#5b8dff", est:"Aug 4" },
];
const ANKI_TOTAL = ANKI_DECKS.reduce((s,d) => s + d.total, 0); // 2887
const ANKI_PER_DAY = ANKI_DECKS.reduce((s,d) => s + d.perDay, 0); // 38

const MARATHON_DATE = "2027-01-18";
const SUMMER_START = "2026-05-18";
const SUMMER_END = "2026-08-02";

// ============================================================
// HELPERS
// ============================================================
function isoDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function todayISO() { return isoDate(new Date()); }
function parseISO(iso) { return new Date(iso + "T12:00:00"); }
function addDays(iso, n) { const d = parseISO(iso); d.setDate(d.getDate()+n); return isoDate(d); }
function dayIdxFromISO(iso) { return (parseISO(iso).getDay() + 6) % 7; }
function findWeek(iso) {
  for (const w of WEEKS) {
    const end = addDays(w.start, 6);
    if (iso >= w.start && iso <= end) return w;
  }
  return null;
}
function daysBetween(a, b) {
  return Math.round((parseISO(b) - parseISO(a)) / 86400000);
}
function formatDate(iso) {
  return parseISO(iso).toLocaleDateString("en-US", { month:"long", day:"numeric", year:"numeric" });
}
function shortDate(iso) {
  const d = parseISO(iso);
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]);
}

// ============================================================
// TASK GENERATION
// ============================================================
function getDayInfo(iso) {
  const week = findWeek(iso);
  const dayIdx = dayIdxFromISO(iso);
  const dow = DOW_LABELS[dayIdx];
  if (!week) return { iso, week:null, dow, dayIdx, tasks: [] };
  const plan = week.plan[dayIdx];
  const tasks = [];

  if (dow === "TUE") {
    tasks.push({ id:"stretch", label:"Stretch 10 min" });
    if (week.program) tasks.push({ id:"program", label:"Summer Program 8 am – 5 pm" });
    tasks.push({ id:"rest", label:"National Soren Day — full rest · No MCAT · No Anki ♥", info:true });
  } else if (dow === "SUN") {
    tasks.push({ id:"stretch", label:"Stretch 10 min · easy walk" });
    tasks.push({ id:"exam", label:"Full MCAT Practice Exam" });
    tasks.push({ id:"examreview", label:"Exam Review + Analysis" });
    tasks.push({ id:"anki", label:"Anki — reviews ONLY (no new cards)" });
  } else if (dow === "SAT") {
    tasks.push({ id:"run", label:`Long Run ${plan} mi · Zone 2 (longest of week)`, miles: plan });
    tasks.push({ id:"stretch", label:"Stretch 10 min" });
    tasks.push({ id:"mcat", label:"MCAT Study 2 hrs" });
    tasks.push({ id:"anki", label:`Anki ${ANKI_PER_DAY} new + reviews` });
  } else if (dow === "THU") {
    tasks.push({ id:"run", label:`${plan} · Zone 1–2 (cross-train)`, cross:true });
    tasks.push({ id:"stretch", label:"Stretch 10 min" });
    if (week.program) tasks.push({ id:"program", label:"Summer Program 8 am – 5 pm" });
    tasks.push({ id:"mcat", label:"MCAT Study 2 hrs" });
    tasks.push({ id:"anki", label:`Anki ${ANKI_PER_DAY} new + reviews` });
  } else { // MON, WED, FRI
    tasks.push({ id:"run", label:`Run ${plan} mi · Zone 2`, miles: plan });
    tasks.push({ id:"stretch", label:"Stretch 10 min" });
    if (week.program) tasks.push({ id:"program", label:"Summer Program 8 am – 5 pm" });
    tasks.push({ id:"mcat", label:"MCAT Study 2 hrs" });
    tasks.push({ id:"anki", label:`Anki ${ANKI_PER_DAY} new + reviews` });
  }

  let sleep = "10:00 pm → 5:45 am · 7 h 45 min";
  if (dow === "TUE") sleep = "10:30 pm → 7:00 am · 8 h 30 min";
  else if (dow === "SAT") sleep = "10:00 pm → 6:30 am · 8 h 30 min";
  else if (dow === "SUN") sleep = "10:00 pm → 7:00 am · 9 h";

  return { iso, week, dow, dayIdx, tasks, sleep, plan };
}

// ============================================================
// STATE / PERSISTENCE
// ============================================================
const STORAGE_KEY = "summer2026_portal_v1";

function defaultState() {
  return {
    checks: {},      // checks[date][taskId] = true
    notes: {},       // notes[date] = string
    anki: Object.fromEntries(ANKI_DECKS.map(d => [d.id, 0])),
    ankiDaily: {},   // ankiDaily[date][deckId] = cards completed that day
    runs: {},        // runs[date] = { actual, notes }
    exams: [],
    overrides: {},   // overrides[date] = { sleep?: {bedtime,wake,scope}, activity?: {type,note} }
  };
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const s = JSON.parse(raw);
    const def = defaultState();
    return {
      checks: s.checks || {},
      notes: s.notes || {},
      anki: { ...def.anki, ...(s.anki || {}) },
      ankiDaily: s.ankiDaily || {},
      runs: s.runs || {},
      exams: s.exams || [],
      overrides: s.overrides || {},
    };
  } catch (e) { return defaultState(); }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  scheduleSyncSave();
}
function isChecked(date, taskId) { return !!(state.checks[date] && state.checks[date][taskId]); }
function setCheck(date, taskId, val) {
  if (!state.checks[date]) state.checks[date] = {};
  if (val) state.checks[date][taskId] = true;
  else delete state.checks[date][taskId];
  if (Object.keys(state.checks[date]).length === 0) delete state.checks[date];
  saveState();
}

let state = loadState();

// ============================================================
// CLOUD SYNC — GitHub Gist backend
// Token lives in localStorage only, never in code or the repo.
// ============================================================
const SYNC_TOKEN_KEY = "summer2026_sync_token";
const SYNC_GIST_KEY  = "summer2026_sync_gist";
const SYNC_LAST_KEY  = "summer2026_sync_last";
const GIST_FILENAME  = "summer2026_data.json";

let syncCfg = {
  token:  localStorage.getItem(SYNC_TOKEN_KEY) || "",
  gistId: localStorage.getItem(SYNC_GIST_KEY)  || "",
  last:   localStorage.getItem(SYNC_LAST_KEY)  || "",
  status: "idle",   // idle | loading | saving | error
  error:  "",
};

async function gistFetch(method, path, body) {
  const res = await fetch("https://api.github.com" + path, {
    method,
    headers: {
      "Authorization": "Bearer " + syncCfg.token,
      "Accept": "application/vnd.github+json",
      "Content-Type": "application/json",
      "X-GitHub-Api-Version": "2022-11-28",
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(res.status + ": " + txt.slice(0, 120));
  }
  return res.json();
}

async function findOrCreateGist() {
  for (let page = 1; page <= 5; page++) {
    const list = await gistFetch("GET", "/gists?per_page=100&page=" + page);
    const hit = list.find(g => g.files && g.files[GIST_FILENAME]);
    if (hit) return hit.id;
    if (list.length < 100) break;
  }
  const created = await gistFetch("POST", "/gists", {
    description: "Summer 2026 Planner sync data",
    public: false,
    files: { [GIST_FILENAME]: { content: JSON.stringify(state) } },
  });
  return created.id;
}

let _syncSaveTimer = null;
function scheduleSyncSave() {
  if (!syncCfg.token || !syncCfg.gistId) return;
  clearTimeout(_syncSaveTimer);
  _syncSaveTimer = setTimeout(pushToGist, 1500);
}

async function pushToGist() {
  if (!syncCfg.token || !syncCfg.gistId) return;
  syncCfg.status = "saving";
  updateSyncUI();
  try {
    await gistFetch("PATCH", "/gists/" + syncCfg.gistId, {
      files: { [GIST_FILENAME]: { content: JSON.stringify(state) } },
    });
    syncCfg.status = "idle";
    syncCfg.error = "";
    syncCfg.last = new Date().toISOString();
    localStorage.setItem(SYNC_LAST_KEY, syncCfg.last);
  } catch (e) {
    syncCfg.status = "error";
    syncCfg.error = e.message;
  }
  updateSyncUI();
}

async function pullFromGist() {
  if (!syncCfg.token || !syncCfg.gistId) return false;
  syncCfg.status = "loading";
  updateSyncUI();
  try {
    const gist = await gistFetch("GET", "/gists/" + syncCfg.gistId);
    const raw = gist.files[GIST_FILENAME]?.content;
    if (!raw) { syncCfg.status = "idle"; updateSyncUI(); return false; }
    const remote = JSON.parse(raw);
    const def = defaultState();
    state = {
      checks:    remote.checks    || {},
      notes:     remote.notes     || {},
      anki:      { ...def.anki, ...(remote.anki || {}) },
      ankiDaily: remote.ankiDaily || {},
      runs:      remote.runs      || {},
      exams:     remote.exams     || [],
      overrides: remote.overrides || {},
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    syncCfg.status = "idle";
    syncCfg.error = "";
    syncCfg.last = new Date().toISOString();
    localStorage.setItem(SYNC_LAST_KEY, syncCfg.last);
    return true;
  } catch (e) {
    syncCfg.status = "error";
    syncCfg.error = e.message;
    updateSyncUI();
    return false;
  }
}

async function connectSync(token) {
  syncCfg.token = token.trim();
  localStorage.setItem(SYNC_TOKEN_KEY, syncCfg.token);
  syncCfg.status = "loading";
  updateSyncUI();
  try {
    const gistId = await findOrCreateGist();
    syncCfg.gistId = gistId;
    localStorage.setItem(SYNC_GIST_KEY, gistId);
    const pulled = await pullFromGist();
    if (!pulled) await pushToGist();
    render();
    return true;
  } catch (e) {
    syncCfg.status = "error";
    syncCfg.error = e.message;
    updateSyncUI();
    return false;
  }
}

function disconnectSync() {
  syncCfg = { token: "", gistId: "", last: "", status: "idle", error: "" };
  [SYNC_TOKEN_KEY, SYNC_GIST_KEY, SYNC_LAST_KEY].forEach(k => localStorage.removeItem(k));
  updateSyncUI();
}

function updateSyncUI() {
  const ind = document.getElementById("sync-indicator");
  if (ind) {
    if (!syncCfg.token) {
      ind.innerHTML = "";
    } else {
      const dot = { idle: "var(--check)", loading: "var(--accent)", saving: "var(--accent)", error: "var(--danger)" }[syncCfg.status];
      const label = { idle: "synced", loading: "syncing…", saving: "saving…", error: "sync error" }[syncCfg.status];
      ind.innerHTML = `<span style="color:${dot};">●</span> <span style="color:var(--muted);">${label}</span>`;
    }
  }
  const sp = document.getElementById("sync-panel");
  if (sp) { sp.outerHTML = buildSyncPanel(); wireSyncPanel(); }
}

// ============================================================
// SCHEDULE OVERRIDES
// ============================================================
const DEFAULT_SLEEP = {
  MON: { bedtime: "22:00", wake: "05:45" },
  TUE: { bedtime: "22:30", wake: "07:00" },
  WED: { bedtime: "22:00", wake: "05:45" },
  THU: { bedtime: "22:00", wake: "05:45" },
  FRI: { bedtime: "22:00", wake: "05:45" },
  SAT: { bedtime: "22:00", wake: "06:30" },
  SUN: { bedtime: "22:00", wake: "07:00" },
};

function formatTime12(hhmm) {
  const [h, m] = hhmm.split(":").map(Number);
  const period = h < 12 ? "am" : "pm";
  const h12 = (h % 12) || 12;
  return `${h12}:${String(m).padStart(2, "0")} ${period}`;
}
function sleepDuration(bedtime, wake) {
  const [bh, bm] = bedtime.split(":").map(Number);
  const [wh, wm] = wake.split(":").map(Number);
  let mins = (wh * 60 + wm) - (bh * 60 + bm);
  if (mins < 0) mins += 1440;
  const h = Math.floor(mins / 60), mn = mins % 60;
  return mn === 0 ? `${h} h` : `${h} h ${mn} m`;
}
function formatSleepBlock(s) {
  return `${formatTime12(s.bedtime)} → ${formatTime12(s.wake)} · ${sleepDuration(s.bedtime, s.wake)}`;
}

// Returns the sleep object {bedtime, wake} in effect for a given date, considering overrides.
function resolvedSleepForDate(date) {
  const dow = DOW_LABELS[dayIdxFromISO(date)];
  const own = state.overrides[date];
  // 1. This day has its own sleep override
  if (own && own.sleep && own.sleep.scope === "day") return own.sleep;
  // 2. Most recent "forward" override on or before this date
  const fwd = Object.keys(state.overrides)
    .filter(d => d <= date && state.overrides[d].sleep && state.overrides[d].sleep.scope === "forward")
    .sort().reverse();
  if (fwd.length > 0) return state.overrides[fwd[0]].sleep;
  // 3. Schedule default
  return DEFAULT_SLEEP[dow];
}

// Returns the date string of the "forward" override affecting this date (if any, from an earlier date).
function inheritedForwardSleepFrom(date) {
  const fwd = Object.keys(state.overrides)
    .filter(d => d < date && state.overrides[d].sleep && state.overrides[d].sleep.scope === "forward")
    .sort().reverse();
  return fwd.length > 0 ? fwd[0] : null;
}

// Does this date have its own stored override (not inherited)?
function hasOwnOverride(date) {
  const o = state.overrides[date];
  return !!(o && (o.sleep || o.activity));
}

function setOverrideProp(date, key, value) {
  if (!state.overrides[date]) state.overrides[date] = {};
  if (value === null || value === undefined) {
    delete state.overrides[date][key];
    if (Object.keys(state.overrides[date]).length === 0) delete state.overrides[date];
  } else {
    state.overrides[date][key] = value;
  }
  saveState();
}

  let startY = 0, gestureLocked = null; // null | "x" | "y"
  let startedAt = 0;
  const THRESHOLD_FRAC = 0.55;
  const QUICK_FLICK_MS = 280;
  const QUICK_FLICK_PX = 90;

  const setX = (px) => {
    task.style.setProperty("--swipe-x", px + "px");
    const pct = Math.max(0, Math.min(1, px / rowWidth));
    row.classList.toggle("swipe-ready", pct >= THRESHOLD_FRAC);
  };

  // Move/up listeners live on document while a gesture is active so iOS can't
  // silently drop them when the pointer moves off the element (setPointerCapture
  // is unreliable in Safari PWA mode).
  const onMove = (e) => {
    if (!active) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;

    if (gestureLocked === null) {
      if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
      gestureLocked = Math.abs(dx) > Math.abs(dy) ? "x" : "y";
      if (gestureLocked === "x") row.classList.add("swiping");
    }
    if (gestureLocked !== "x") return;

    // Once locked horizontal, prevent the page from scrolling
    try { e.preventDefault(); } catch (_) {}

    currentX = Math.max(0, Math.min(dx, rowWidth + 40));
    if (currentX > rowWidth) currentX = rowWidth + (currentX - rowWidth) * 0.35;
    setX(currentX);
  };

  const cleanup = () => {
    document.removeEventListener("pointermove", onMove);
    document.removeEventListener("pointerup",   onUp);
    document.removeEventListener("pointercancel", onUp);
  };

  const onUp = () => {
    if (!active) return;
    active = false;
    cleanup();

    if (gestureLocked !== "x") { row.classList.remove("swiping"); return; }

    const pct = currentX / rowWidth;
    const elapsed = performance.now() - startedAt;
    const isFlick = elapsed < QUICK_FLICK_MS && currentX > QUICK_FLICK_PX;
    row.classList.remove("swiping");

    if (pct >= THRESHOLD_FRAC || isFlick) {
      row.classList.add("swipe-complete");
      row._swipedJustNow = true;
      task.style.setProperty("--swipe-x", (rowWidth + 80) + "px");
      triggerHaptic('heavy'); // swipe-complete = strong confirmation
      setTimeout(() => { try { onComplete(); } catch (_) {} }, 240);
    } else {
      setX(0);
    }
  };

  task.addEventListener("pointerdown", (e) => {
    if (e.button && e.button !== 0) return;
    active = true;
    gestureLocked = null;
    startX = e.clientX;
    startY = e.clientY;
    currentX = 0;
    startedAt = performance.now();
    rowWidth = row.getBoundingClientRect().width;
    // Attach move/up to document so iOS keeps delivering events even if the
    // pointer drifts off the element.
    document.addEventListener("pointermove", onMove, { passive: false });
    document.addEventListener("pointerup",   onUp);
    document.addEventListener("pointercancel", onUp);
  });
}

// ----- TODAY -----
function renderToday() {
  const today = todayISO();
  let viewDate = currentViewDate || today;
  if (viewDate < SUMMER_START) viewDate = SUMMER_START;
  if (viewDate > SUMMER_END) viewDate = SUMMER_END;

  const info = getDayInfo(viewDate);
  if (!info.week) {
    content.innerHTML = `<div class="panel"><p class="empty">No schedule for ${formatDate(viewDate)}. Plan runs ${formatDate(SUMMER_START)} → ${formatDate(SUMMER_END)}.</p></div>`;
    return;
  }

  const realTasks = info.tasks.filter(t => t.id !== "rest");
  const doneCount = realTasks.filter(t => isChecked(viewDate, t.id)).length;
  const pct = realTasks.length ? Math.round(doneCount / realTasks.length * 100) : 0;

  // Override state for this day
  const actOvr = (state.overrides[viewDate] || {}).activity;
  const isEditOpen = currentEditDate === viewDate;
  const hasOwn = hasOwnOverride(viewDate);
  const inheritedFrom = inheritedForwardSleepFrom(viewDate);

  // Task list — mark overridden workout tasks
  const swipeMode = getCompletionMode() === "swipe";
  const taskHtml = info.tasks.map(t => {
    const overridden = actOvr && t.id === "run" && (actOvr.type === "skip" || actOvr.type === "rest");
    const isDone = isChecked(viewDate, t.id);
    const canSwipe = swipeMode && !isDone && !overridden;
    const noteHtml = overridden
      ? `<div class="task-override-note">↩ ${actOvr.type === "rest" ? "Rest day" : "Skipped"}${actOvr.note ? ` — ${escapeHtml(actOvr.note)}` : ""}</div>`
      : "";
    return `
      <div class="task-row ${canSwipe ? "swipe-enabled" : ""}" data-task-row="${t.id}">
        <div class="task-swipe-bg" aria-hidden="true"><span class="task-swipe-icon">✓</span><span class="task-swipe-label">${canSwipe ? "Release to complete" : ""}</span></div>
        <div class="task ${isDone ? "done" : ""} ${overridden ? "overridden" : ""}" data-task="${t.id}" data-cat="${t.id}">
          <div class="checkbox"></div>
          <div class="task-content"><div class="task-label">${t.label}</div>${noteHtml}</div>
        </div>
      </div>`;
  }).join("");

  // Banners
  const cutbackHtml = info.week.cutback
    ? `<div class="cutback-banner">⚡ Cutback Week — mileage drops ~25% to absorb training load</div>` : "";
  let actBanner = "";
  if (actOvr) {
    actBanner = actOvr.type === "rest"
      ? `<div class="override-banner rest">Rest Day Override${actOvr.note ? ` — ${escapeHtml(actOvr.note)}` : ""}</div>`
      : `<div class="override-banner skip">Run / Cross-train Skipped${actOvr.note ? ` — ${escapeHtml(actOvr.note)}` : ""}</div>`;
  }

  // Sleep — resolved with overrides
  const sleepObj = resolvedSleepForDate(viewDate);
  const sleepDisplay = formatSleepBlock(sleepObj);
  const ownSleepOvr = state.overrides[viewDate] && state.overrides[viewDate].sleep;
  const sleepTag = ownSleepOvr
    ? `<span class="override-indicator" style="margin-left:8px;">✏ ${ownSleepOvr.scope === "day" ? "Tonight only" : "Forward"}</span>`
    : inheritedFrom
    ? `<span class="override-indicator" style="margin-left:8px; opacity:0.7;">↩ From ${shortDate(inheritedFrom)}</span>`
    : "";

  // Override indicator in header
  const ovrTag = hasOwn
    ? `<span class="override-indicator" style="margin-left:6px;">✏ Customized</span>` : "";

  // Edit button style reflects open state
  const editBtnStyle = isEditOpen
    ? `background:var(--gold); border-color:var(--gold); color:#1a1200;`
    : ``;

  content.innerHTML = `
    <div class="panel">
      <div class="today-header">
        <div>
          <div class="today-date">${formatDate(viewDate)}</div>
          <div class="today-day" style="display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top:4px;">
            <span>${DOW_FULL[info.dayIdx]} · ${info.week.label} · ${info.week.total} mi target</span>
            ${ovrTag}
          </div>
        </div>
        <div class="row">
          <button class="btn btn-ghost btn-sm" id="prev-day">← Prev</button>
          <button class="btn btn-ghost btn-sm" id="today-btn">Today</button>
          <button class="btn btn-ghost btn-sm" id="next-day">Next →</button>
          <input type="date" id="date-jump" value="${viewDate}" min="${SUMMER_START}" max="${SUMMER_END}">
          <div class="day-badge badge-${info.dow.toLowerCase()}">${info.dow}</div>
          <button class="btn btn-sm btn-ghost" id="toggle-edit" style="${editBtnStyle}">✏ Edit Day</button>
        </div>
      </div>
      ${cutbackHtml}${actBanner}
      <div class="progress-pill" style="margin-bottom:14px;">
        <span class="hint">Today's progress:</span>
        <div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
        <strong>${doneCount}/${realTasks.length}</strong>
        <span class="hint">(${pct}%)</span>
      </div>
      <div class="task-list" id="task-list">${taskHtml}</div>
      <div style="margin-top:18px;">
        <h3>Stretch Resources</h3>
        <div class="resource-links">
          <a href="https://www.youtube.com/watch?v=_4XL82i2Lko" target="_blank" rel="noopener" class="resource-btn">
            <span class="resource-icon">▶</span> Pre-Run Mobility <span class="resource-dur">10 min</span>
          </a>
          <a href="https://www.youtube.com/watch?v=2-Cswfkzd50" target="_blank" rel="noopener" class="resource-btn">
            <span class="resource-icon">▶</span> Post-Run Stretch <span class="resource-dur">10 min</span>
          </a>
          <a href="https://www.youtube.com/watch?v=FbmLx-PahO4" target="_blank" rel="noopener" class="resource-btn">
            <span class="resource-icon">▶</span> Cool-Down / Yoga <span class="resource-dur">10 min</span>
          </a>
        </div>
      </div>
      <div style="margin-top:18px;">
        <h3>Sleep Target</h3>
        <div class="sleep-block" style="display:flex; align-items:center; gap:4px; flex-wrap:wrap;">
          <span>Lights out → wake · <strong>${sleepDisplay}</strong></span>${sleepTag}
        </div>
      </div>
      <div style="margin-top:16px;">
        <h3>Day Notes</h3>
        <textarea class="notes" id="day-notes" placeholder="HR feel, energy, what worked, what didn't...">${escapeHtml(state.notes[viewDate] || "")}</textarea>
      </div>
    </div>
    ${isEditOpen ? buildEditPanel(viewDate, info) : ""}
    ${ankiCheckinPanelHTML(viewDate)}
  `;

  content.querySelector("#task-list").addEventListener("click", e => {
    const t = e.target.closest(".task");
    if (!t) return;
    const row = t.closest(".task-row");
    // If a swipe just finished, the synthetic click that follows pointerup
    // shouldn't also toggle the task.
    if (row && row._swipedJustNow) { row._swipedJustNow = false; return; }
    // In swipe mode, the body of the task is reserved for swiping — only
    // the checkbox itself toggles (so you can still tap to undo).
    if (getCompletionMode() === "swipe" && !t.classList.contains("done") && !e.target.closest(".checkbox")) return;
    const id = t.dataset.task;
    const newVal = !isChecked(viewDate, id);
    triggerHaptic(newVal ? 'medium' : 'light'); // complete = medium, uncheck = light
    setCheck(viewDate, id, newVal);
    if (id === "run" && newVal) {
      const task = info.tasks.find(x => x.id === "run");
      if (task && task.miles && !state.runs[viewDate]) {
        state.runs[viewDate] = { actual: task.miles, notes: "" };
        saveState();
      }
    }
    renderToday();
  });

  // Wire swipe-to-complete on each row (if swipe mode is on)
  if (getCompletionMode() === "swipe") {
    for (const row of content.querySelectorAll("#task-list .task-row.swipe-enabled")) {
      attachSwipeToComplete(row, () => {
        const id = row.dataset.taskRow;
        setCheck(viewDate, id, true);
        if (id === "run") {
          const task = info.tasks.find(x => x.id === "run");
          if (task && task.miles && !state.runs[viewDate]) {
            state.runs[viewDate] = { actual: task.miles, notes: "" };
            saveState();
          }
        }
        renderToday();
      });
    }
  }

  document.getElementById("prev-day").onclick   = () => { currentEditDate = null; currentViewDate = addDays(viewDate, -1); renderToday(); };
  document.getElementById("next-day").onclick   = () => { currentEditDate = null; currentViewDate = addDays(viewDate, 1);  renderToday(); };
  document.getElementById("today-btn").onclick  = () => { currentEditDate = null; currentViewDate = todayISO();            renderToday(); };
  document.getElementById("date-jump").onchange = e => { currentEditDate = null; currentViewDate = e.target.value;         renderToday(); };
  document.getElementById("toggle-edit").onclick = () => {
    currentEditDate = (currentEditDate === viewDate) ? null : viewDate;
    renderToday();
  };

  const noteEl = document.getElementById("day-notes");
  noteEl.addEventListener("input", () => {
    const v = noteEl.value;
    if (v) state.notes[viewDate] = v; else delete state.notes[viewDate];
    saveState();
  });

  if (isEditOpen) wireUpEditPanel(viewDate);
  wireUpAnkiCheckin(viewDate, renderToday);
}

// ----- WEEK -----
function renderWeek() {
  const today = todayISO();
  let wkIdx = currentWeekIdx;
  if (wkIdx === null) {
    const w = findWeek(today);
    wkIdx = w ? WEEKS.indexOf(w) : 0;
  }
  const week = WEEKS[wkIdx];

  const dayCards = [];
  for (let i = 0; i < 7; i++) {
    const date = addDays(week.start, i);
    const info = getDayInfo(date);
    const isToday = date === today;
    const dow = info.dow;
    const cutbackClass = week.cutback ? " cutback" : "";
    const tasksHtml = info.tasks.map(t => `
      <div class="mini-task ${isChecked(date, t.id) ? "done" : ""}" data-date="${date}" data-task="${t.id}">
        <div class="mini-check"></div>
        <span>${t.label}</span>
      </div>
    `).join("");
    dayCards.push(`
      <div class="day-card${isToday ? " today" : ""}${cutbackClass}">
        <div class="day-card-header">
          <span>${dow} · ${shortDate(date)}${hasOwnOverride(date) ? `<span class="week-ovr-dot" title="Has override"></span>` : ""}</span>
          <span class="day-badge badge-${dow.toLowerCase()}" style="font-size:9px; padding:2px 6px;">${dow}</span>
        </div>
        <div class="day-tasks">${tasksHtml}</div>
      </div>
    `);
  }

  const weekOpts = WEEKS.map((w, i) => `<option value="${i}" ${i===wkIdx ? "selected" : ""}>${w.label} · ${shortDate(w.start)}–${shortDate(addDays(w.start,6))} · ${w.total} mi${w.cutback ? " ⚡" : ""}</option>`).join("");

  content.innerHTML = `
    <div class="panel">
      <div class="week-nav">
        <div class="row">
          <button class="btn btn-ghost btn-sm" id="prev-wk">← Prev Week</button>
          <select id="week-select">${weekOpts}</select>
          <button class="btn btn-ghost btn-sm" id="next-wk">Next Week →</button>
          <button class="btn btn-ghost btn-sm" id="this-wk">This Week</button>
        </div>
        <div class="hint">${week.cutback ? "⚡ Cutback week — mileage drops ~25%" : ""}</div>
      </div>
      <div class="week-grid">${dayCards.join("")}</div>
    </div>
  `;

  document.getElementById("week-select").onchange = e => { currentWeekIdx = parseInt(e.target.value); renderWeek(); };
  document.getElementById("prev-wk").onclick = () => { currentWeekIdx = Math.max(0, wkIdx-1); renderWeek(); };
  document.getElementById("next-wk").onclick = () => { currentWeekIdx = Math.min(WEEKS.length-1, wkIdx+1); renderWeek(); };
  document.getElementById("this-wk").onclick = () => { currentWeekIdx = null; renderWeek(); };

  for (const el of content.querySelectorAll(".mini-task")) {
    el.addEventListener("click", () => {
      const d = el.dataset.date;
      const t = el.dataset.task;
      setCheck(d, t, !isChecked(d, t));
      el.classList.toggle("done");
    });
  }
}

// ----- ANKI -----
function renderAnki() {
  const today = todayISO();
  let viewDate = currentViewDate || today;
  if (viewDate < SUMMER_START) viewDate = SUMMER_START;
  if (viewDate > SUMMER_END) viewDate = SUMMER_END;

  // Aggregate totals
  let totalActual = 0, totalBacklogYesterday = 0, totalTargetToday = 0, totalDoneToday = 0;
  ANKI_DECKS.forEach(d => {
    totalActual += ankiActualTotal(d.id);
    totalBacklogYesterday += ankiBacklog(d.id, addDays(viewDate, -1));
    totalTargetToday += ankiAdjustedTarget(d.id, viewDate);
    totalDoneToday += ankiDailyEntry(viewDate, d.id);
  });
  const totalPct = Math.round(totalActual / ANKI_TOTAL * 100);
  const isCard = isCardDay(viewDate);
  const dow = DOW_LABELS[dayIdxFromISO(viewDate)];
  const backlogNow = isCard
    ? totalBacklogYesterday + ANKI_PER_DAY - totalDoneToday
    : totalBacklogYesterday;
  const todayPct = totalTargetToday ? Math.round(totalDoneToday / totalTargetToday * 100) : 0;
  const backlogBorder = backlogNow > 0 ? "var(--danger)" : (backlogNow < 0 ? "var(--check)" : "var(--muted)");

  // Per-deck cards (overall progress)
  const decksHtml = ANKI_DECKS.map(deck => {
    const done = ankiActualTotal(deck.id);
    const pct = Math.min(100, Math.round(done / deck.total * 100));
    const remaining = Math.max(0, deck.total - done);
    const backlog = ankiBacklog(deck.id, addDays(viewDate, -1));
    const target = ankiAdjustedTarget(deck.id, viewDate);
    const extra = target - deck.perDay;
    return `
      <div class="deck" style="--deck-color:${deck.color};">
        <div class="deck-name">${deck.name}</div>
        <div class="deck-stats">${deck.perDay}/day · ${deck.total} total · est. ${deck.est}</div>
        <div class="deck-progress">
          <div class="deck-progress-bar" style="width:${pct}%; background:${deck.color};"></div>
        </div>
        <div class="deck-numbers">
          <div><strong>${done}</strong> / ${deck.total} <span class="hint">(${pct}%)</span></div>
          <div class="hint">${remaining > 0 ? `${remaining} left` : "✓ done"}</div>
        </div>
        <div class="deck-numbers" style="margin-top:10px; padding-top:10px; border-top:1px dashed var(--border);">
          <div class="hint">Backlog: ${formatBacklog(backlog)}</div>
          ${isCard ? `<div class="hint">Today: <strong style="color:${extra>0?'var(--gold)':'var(--text)'}">${target}</strong>${extra>0?` <span style="color:var(--gold)">(+${extra})</span>`:""}</div>` : `<div class="hint">${dow === "TUE" ? "no Anki" : "reviews only"}</div>`}
        </div>
      </div>
    `;
  }).join("");

  content.innerHTML = `
    <div class="panel">
      <h2>Anki — Overall Status</h2>
      <div class="dash-grid">
        <div class="stat-card theme-anki">
          <div class="stat-label">Cards Done</div>
          <div class="stat-value">${totalActual} <span class="frac">/ ${ANKI_TOTAL}</span></div>
          <div class="stat-sub">${totalPct}% of deck total</div>
        </div>
        <div class="stat-card ${backlogNow > 0 ? "theme-backlog" : (backlogNow < 0 ? "theme-streak" : "")}">
          <div class="stat-label">Backlog (running total)</div>
          <div class="stat-value">${backlogNow > 0 ? "+" : ""}${backlogNow}</div>
          <div class="stat-sub">${backlogNow > 0 ? "cards behind plan" : (backlogNow < 0 ? `cards ahead of plan` : "exactly on plan")}</div>
        </div>
        <div class="stat-card theme-mcat">
          <div class="stat-label">Today's Target</div>
          <div class="stat-value">${isCard ? totalTargetToday : "—"}</div>
          <div class="stat-sub">${isCard ? (totalTargetToday > ANKI_PER_DAY ? `Base ${ANKI_PER_DAY} + ${totalTargetToday-ANKI_PER_DAY} redistributed` : `Base ${ANKI_PER_DAY}`) : `${dow} · no new cards today`}</div>
        </div>
        <div class="stat-card theme-cool">
          <div class="stat-label">Done Today</div>
          <div class="stat-value">${totalDoneToday}${isCard ? ` <span class="frac">/ ${totalTargetToday}</span>` : ""}</div>
          <div class="stat-sub">${isCard ? `${todayPct}% of today's target` : "—"}</div>
        </div>
      </div>
      <div class="bubble-chart">${
        (() => {
          const maxTotal = Math.max(...ANKI_DECKS.map(d => d.total));
          const minSize = 64, maxSize = 168;
          // Pastel color map per deck — overrides whatever the deck originally specified
          const colorMap = {
            behavioral: { bg: "var(--lavender)", soft: "var(--lavender-soft)" },
            biochem:    { bg: "var(--peach)",    soft: "var(--peach-soft)" },
            biology:    { bg: "var(--mint)",     soft: "var(--mint-soft)" },
            equations:  { bg: "var(--butter)",   soft: "var(--butter-soft)" },
            genchem:    { bg: "var(--sky)",      soft: "var(--sky-soft)" },
            ochem:      { bg: "var(--blush)",    soft: "var(--blush-soft)" },
            physmath:   { bg: "#C9C0EA", soft: "#E6E0F5" },
          };
          return ANKI_DECKS.map(d => {
            const done = ankiActualTotal(d.id);
            const pct = Math.min(100, Math.round(done / d.total * 100));
            const size = Math.round(minSize + (d.total / maxTotal) * (maxSize - minSize));
            const c = colorMap[d.id] || { bg: "var(--coral)", soft: "var(--peach-soft)" };
            return `<div class="bubble" style="width:${size}px; height:${size}px; background:${c.bg};" title="${d.name} · ${done}/${d.total} (${pct}%)">
              <div class="bubble-label">${d.name}</div>
              <div class="bubble-sub">${pct}%</div>
            </div>`;
          }).join("");
        })()
      }</div>
      <div class="hint" style="margin-top: 12px;">Each bubble = one deck, sized by total cards. ${ANKI_PER_DAY} new/day on Mon · Wed · Thu · Fri · Sat · Sun = reviews only · Tue = no Anki. Missed cards roll forward.</div>
      <div class="row" style="margin-top:12px;">
        <button class="btn btn-ghost btn-sm" id="anki-prev">← Prev Day</button>
        <button class="btn btn-ghost btn-sm" id="anki-today">Today</button>
        <button class="btn btn-ghost btn-sm" id="anki-next">Next Day →</button>
        <input type="date" id="anki-date" value="${viewDate}" min="${SUMMER_START}" max="${SUMMER_END}">
        <div class="hint" style="margin-left:auto;">Viewing ${formatDate(viewDate)}</div>
      </div>
    </div>
    ${ankiCheckinPanelHTML(viewDate)}
    <div class="panel">
      <h2>By Deck — Overall Progress</h2>
      <div class="anki-grid">${decksHtml}</div>
    </div>
  `;

  document.getElementById("anki-prev").onclick = () => { currentViewDate = addDays(viewDate, -1); renderAnki(); };
  document.getElementById("anki-next").onclick = () => { currentViewDate = addDays(viewDate, 1); renderAnki(); };
  document.getElementById("anki-today").onclick = () => { currentViewDate = todayISO(); renderAnki(); };
  document.getElementById("anki-date").onchange = e => { currentViewDate = e.target.value; renderAnki(); };

  wireUpAnkiCheckin(viewDate, renderAnki);
}

// ----- RUNNING -----
function renderRunning() {
  let totalPlanned = 0, totalActual = 0;
  const weekRows = WEEKS.map(w => {
    let plan = 0, actual = 0;
    for (let i = 0; i < 7; i++) {
      const date = addDays(w.start, i);
      if (typeof w.plan[i] === "number") plan += w.plan[i];
      const r = state.runs[date];
      if (r && typeof r.actual === "number") actual += r.actual;
    }
    totalPlanned += plan;
    totalActual += actual;
    const pct = plan ? Math.round(actual/plan*100) : 0;
    return `
      <tr class="${w.cutback ? "cutback" : ""}">
        <td><strong>${w.label}</strong>${w.cutback ? " ⚡" : ""}</td>
        <td>${shortDate(w.start)}–${shortDate(addDays(w.start,6))}</td>
        <td>${plan.toFixed(1)} mi</td>
        <td><strong>${actual.toFixed(1)} mi</strong></td>
        <td><div class="bar"><div class="bar-fill ${pct>100?"over":""}" style="width:${Math.min(100,pct)}%"></div></div></td>
        <td>${pct}%</td>
      </tr>
    `;
  }).join("");

  const today = todayISO();
  let wkIdx = currentWeekIdx;
  if (wkIdx === null) {
    const w = findWeek(today);
    wkIdx = w ? WEEKS.indexOf(w) : 0;
  }
  const week = WEEKS[wkIdx];

  const dailyRows = [];
  for (let i = 0; i < 7; i++) {
    const date = addDays(week.start, i);
    const dow = DOW_LABELS[i];
    const plan = week.plan[i];
    const r = state.runs[date] || {};
    const isRun = typeof plan === "number";
    const isCross = typeof plan === "string";
    const planLabel = isRun ? `${plan} mi${dow==="SAT" ? " · long" : ""}` : (isCross ? plan : "rest");
    const isTodayRow = date === today;
    dailyRows.push(`
      <tr class="${isTodayRow?"today-row":""}">
        <td><strong>${dow}</strong> ${shortDate(date)}</td>
        <td>${planLabel}</td>
        <td>${isRun ? `<input type="number" step="0.1" data-rundate="${date}" value="${r.actual ?? ""}" placeholder="${plan}" style="width:70px;">` : (isCross ? `<input type="text" data-rundate-text="${date}" value="${escapeHtml(r.actualText||'')}" placeholder="${plan}" style="width:100px;">` : "—")}</td>
        <td>${(isRun || isCross) ? `<input type="text" data-runnotes="${date}" value="${escapeHtml(r.notes||"")}" placeholder="HR / pace / how it felt" style="width:100%;">` : ""}</td>
      </tr>
    `);
  }

  const weekOpts = WEEKS.map((w, i) => `<option value="${i}" ${i===wkIdx ? "selected" : ""}>${w.label}</option>`).join("");

  // Weekly bars chart
  const maxMi = Math.max(...WEEKS.map(w => w.total));
  const chartBars = WEEKS.map(w => {
    let actual = 0;
    for (let i = 0; i < 7; i++) {
      const date = addDays(w.start, i);
      const r = state.runs[date];
      if (r && typeof r.actual === "number") actual += r.actual;
    }
    const planH = w.total / maxMi * 100;
    const actH = actual / maxMi * 100;
    return `
      <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; min-width:0;">
        <div style="position:relative; width:100%; height:120px; display:flex; align-items:flex-end; justify-content:center; gap:3px;">
          <div title="planned ${w.total} mi" style="width:14px; height:${planH}%; background:var(--border-2); border-radius:2px 2px 0 0;"></div>
          <div title="actual ${actual.toFixed(1)} mi" style="width:14px; height:${actH}%; background:${w.cutback?"var(--gold)":"var(--sat)"}; border-radius:2px 2px 0 0;"></div>
        </div>
        <div style="font-size:10px; color:var(--muted);">${w.label.replace("Prog ","").replace("Pre ","P-")}</div>
      </div>
    `;
  }).join("");

  content.innerHTML = `
    <div class="panel">
      <h2>Summer Total</h2>
      <div class="dash-grid">
        <div class="stat-card theme-miles">
          <div class="stat-label">Miles Logged</div>
          <div class="stat-value">${totalActual.toFixed(1)} <span class="frac">/ ${totalPlanned.toFixed(0)}</span></div>
          <div class="stat-sub">${totalPlanned?Math.round(totalActual/totalPlanned*100):0}% of plan</div>
        </div>
        <div class="stat-card theme-backlog">
          <div class="stat-label">Peak Week (Wk 10)</div>
          <div class="stat-value">21 <span class="frac">mi</span></div>
          <div class="stat-sub">Jul 20 – Jul 26</div>
        </div>
        <div class="stat-card theme-days">
          <div class="stat-label">Longest Long Run</div>
          <div class="stat-value">7.0 <span class="frac">mi</span></div>
          <div class="stat-sub">Sat Jul 25</div>
        </div>
      </div>
      <div style="display:flex; align-items:flex-end; gap:8px; padding:16px 0 0; border-top:1px solid var(--border); margin-top:8px;">${chartBars}</div>
      <div class="hint" style="margin-top:10px; text-align:center;">Gray = planned · Green = actual · Gold = cutback weeks</div>
    </div>
    <div class="panel">
      <h2>Weekly Breakdown</h2>
      <div class="table-scroll">
      <table class="run-table">
        <thead><tr><th>Week</th><th>Dates</th><th>Planned</th><th>Actual</th><th>Progress</th><th>%</th></tr></thead>
        <tbody>${weekRows}</tbody>
      </table>
      </div>
    </div>
    <div class="panel">
      <h2>Log Runs — <select id="run-week-select">${weekOpts}</select></h2>
      <table class="run-table">
        <thead><tr><th>Day</th><th>Planned</th><th>Actual</th><th>Notes</th></tr></thead>
        <tbody>${dailyRows.join("")}</tbody>
      </table>
      <div class="hint" style="margin-top: 8px;">Cross-train notes go in the Notes field. Long runs (Sat) are the longest run of each week.</div>
    </div>
  `;

  document.getElementById("run-week-select").onchange = e => { currentWeekIdx = parseInt(e.target.value); renderRunning(); };
  for (const inp of content.querySelectorAll("input[data-rundate]")) {
    inp.onchange = () => {
      const d = inp.dataset.rundate;
      if (!state.runs[d]) state.runs[d] = {};
      const v = parseFloat(inp.value);
      state.runs[d].actual = isNaN(v) ? null : v;
      if (!isNaN(v) && v > 0) triggerHaptic('medium'); // logged a run
      saveState();
      renderRunning();
    };
  }
  for (const inp of content.querySelectorAll("input[data-rundate-text]")) {
    inp.onchange = () => {
      const d = inp.dataset.rundateText;
      if (!state.runs[d]) state.runs[d] = {};
      state.runs[d].actualText = inp.value;
      saveState();
    };
  }
  for (const inp of content.querySelectorAll("input[data-runnotes]")) {
    inp.onchange = () => {
      const d = inp.dataset.runnotes;
      if (!state.runs[d]) state.runs[d] = {};
      state.runs[d].notes = inp.value;
      saveState();
    };
  }
}

// ----- MCAT -----
function renderMCAT() {
  const exams = [...state.exams].sort((a,b) => a.date.localeCompare(b.date));
  const passages = [...(state.carsPassages || [])].sort((a,b) => a.date.localeCompare(b.date));

  // --- Exam chart ---
  let chartHtml = "";
  if (exams.length > 0) {
    const minS = 472, maxS = 528;
    chartHtml = `
      <div class="exam-chart">
        ${exams.map(e => {
          const h = ((e.overall - minS) / (maxS - minS)) * 100;
          return `<div class="exam-bar" style="height:${Math.max(8,h)}%">
            <div class="exam-bar-value">${e.overall}</div>
            <div class="exam-bar-label">${shortDate(e.date)}</div>
          </div>`;
        }).join("")}
      </div>
      <div class="hint" style="text-align:center; margin-top:24px;">Score scale 472–528 · gray line is target 515+</div>
    `;
  }

  // --- Exam list ---
  let listHtml;
  if (exams.length === 0) {
    listHtml = `<div class="empty">No exams logged yet. Add your first below.</div>`;
  } else {
    const items = exams.map((e, i) => {
      const trend = i > 0 ? e.overall - exams[i-1].overall : 0;
      const trendStr = i === 0 ? "" : (trend > 0 ? `+${trend}` : `${trend}`);
      const trendColor = trend > 0 ? "var(--check)" : (trend < 0 ? "var(--danger)" : "var(--muted)");
      return `
        <div class="exam-item">
          <div>${shortDate(e.date)}</div>
          <div><strong style="font-size:16px;">${e.overall}</strong> <span style="color:${trendColor}; font-size:11px;">${trendStr}</span></div>
          <div>${e.cp || "—"}</div>
          <div>${e.cars || "—"}</div>
          <div>${e.bb || "—"}</div>
          <div>${e.ps || "—"}</div>
          <div style="color:var(--muted); font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${escapeHtml(e.notes)}">${escapeHtml(e.notes || "")}</div>
          <button class="delete-btn" data-exam="${e.id}" title="Delete">✕</button>
        </div>
      `;
    }).join("");
    listHtml = `
      <div class="exam-list">
        <div class="exam-item header"><div>Date</div><div>Overall</div><div>C/P</div><div>CARS</div><div>B/B</div><div>P/S</div><div>Notes</div><div></div></div>
        ${items}
      </div>
    `;
  }

  const count = exams.length;
  const avg = count ? Math.round(exams.reduce((s,e) => s+e.overall, 0) / count) : 0;
  const best = count ? Math.max(...exams.map(e => e.overall)) : 0;
  const latest = count ? exams[exams.length-1].overall : 0;

  // --- CARS passage chart ---
  let carsChartHtml = "";
  if (passages.length > 0) {
    carsChartHtml = `
      <div class="exam-chart cars-chart">
        <div class="cars-target"></div>
        ${passages.map(p => {
          const pct = Math.round(p.correct / p.total * 100);
          return `<div class="exam-bar cars-bar" style="height:${Math.max(8, pct)}%" title="${p.correct}/${p.total} correct">
            <div class="exam-bar-value">${pct}%</div>
            <div class="exam-bar-label">${shortDate(p.date)}</div>
          </div>`;
        }).join("")}
      </div>
      <div class="hint" style="text-align:center; margin-top:24px;">% correct per passage · dashed line = 70% target</div>
    `;
  }

  // --- CARS passage list ---
  let carsListHtml;
  if (passages.length === 0) {
    carsListHtml = `<div class="empty">No passages logged yet. Add your first below.</div>`;
  } else {
    const carsItems = passages.map((p, i) => {
      const pct = Math.round(p.correct / p.total * 100);
      const prevPct = i > 0 ? Math.round(passages[i-1].correct / passages[i-1].total * 100) : null;
      const trend = prevPct !== null ? pct - prevPct : 0;
      const trendStr = i === 0 ? "" : (trend > 0 ? `+${trend}` : `${trend}`);
      const trendColor = trend > 0 ? "var(--check)" : (trend < 0 ? "var(--danger)" : "var(--muted)");
      return `
        <div class="cars-item">
          <div>${shortDate(p.date)}</div>
          <div>${p.correct}/${p.total}</div>
          <div><strong>${pct}%</strong> <span style="color:${trendColor}; font-size:11px;">${trendStr}</span></div>
          <div style="color:var(--muted);">${p.difficulty || "—"}</div>
          <div style="color:var(--muted); font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${escapeHtml(p.notes)}">${escapeHtml(p.notes || "")}</div>
          <button class="delete-btn" data-cars="${p.id}" title="Delete">✕</button>
        </div>
      `;
    }).join("");
    carsListHtml = `
      <div class="exam-list">
        <div class="cars-item header"><div>Date</div><div>Score</div><div>%</div><div>Difficulty</div><div>Notes</div><div></div></div>
        ${carsItems}
      </div>
    `;
  }

  // --- CARS stats ---
  const carsCount = passages.length;
  const carsPcts = passages.map(p => Math.round(p.correct / p.total * 100));
  const carsAvg = carsCount ? Math.round(carsPcts.reduce((s,v) => s+v, 0) / carsCount) : 0;
  const carsBest = carsCount ? Math.max(...carsPcts) : 0;
  const carsRecent5 = carsPcts.slice(-5);
  const carsRecentAvg = carsRecent5.length ? Math.round(carsRecent5.reduce((s,v) => s+v, 0) / carsRecent5.length) : 0;

  content.innerHTML = `
    <div class="panel">
      <h2>MCAT Practice Exams</h2>
      <div class="dash-grid">
        <div class="stat-card theme-mcat"><div class="stat-label">Exams Taken</div><div class="stat-value">${count} <span class="frac">/ 11</span></div></div>
        <div class="stat-card theme-backlog"><div class="stat-label">Latest</div><div class="stat-value">${latest || "—"}</div></div>
        <div class="stat-card theme-streak"><div class="stat-label">Best</div><div class="stat-value">${best || "—"}</div></div>
        <div class="stat-card theme-cool"><div class="stat-label">Average</div><div class="stat-value">${avg || "—"}</div></div>
      </div>
      ${chartHtml}
    </div>
    <div class="panel">
      <h2>Add Exam</h2>
      <div class="exam-form">
        <div class="exam-row"><label>Date</label><input type="date" id="ex-date" min="${SUMMER_START}" max="${SUMMER_END}" value="${todayISO()}"></div>
        <div class="exam-row"><label>Overall (472–528)</label><input type="number" id="ex-overall" min="472" max="528" placeholder="500"></div>
        <div class="exam-row"><label>C/P (118–132)</label><input type="number" id="ex-cp" min="118" max="132" placeholder="125"></div>
        <div class="exam-row"><label>CARS</label><input type="number" id="ex-cars" min="118" max="132" placeholder="125"></div>
        <div class="exam-row"><label>B/B</label><input type="number" id="ex-bb" min="118" max="132" placeholder="125"></div>
        <div class="exam-row"><label>P/S</label><input type="number" id="ex-ps" min="118" max="132" placeholder="125"></div>
      </div>
      <div class="exam-row" style="margin-bottom:14px;"><label>Notes</label><input type="text" id="ex-notes" placeholder="What to review, weak areas, timing issues..."></div>
      <button class="btn" id="add-exam">+ Add Exam</button>
    </div>
    <div class="panel">
      <h2>Exam History</h2>
      ${listHtml}
    </div>
    <div class="panel">
      <h2>CARS Passage Tracker</h2>
      <div class="dash-grid">
        <div class="stat-card theme-mcat"><div class="stat-label">Passages Logged</div><div class="stat-value">${carsCount || "—"}</div></div>
        <div class="stat-card theme-mcat"><div class="stat-label">Average</div><div class="stat-value">${carsAvg ? carsAvg + "%" : "—"}</div></div>
        <div class="stat-card theme-streak"><div class="stat-label">Best</div><div class="stat-value">${carsBest ? carsBest + "%" : "—"}</div></div>
        <div class="stat-card theme-cool"><div class="stat-label">Last 5 Avg</div><div class="stat-value">${carsRecentAvg ? carsRecentAvg + "%" : "—"}</div></div>
      </div>
      ${carsChartHtml}
    </div>
    <div class="panel">
      <h2>Log CARS Passage</h2>
      <div class="exam-form">
        <div class="exam-row"><label>Date</label><input type="date" id="cp-date" min="${SUMMER_START}" max="${SUMMER_END}" value="${todayISO()}"></div>
        <div class="exam-row"><label>Correct Answers</label><input type="number" id="cp-correct" min="0" max="10" placeholder="5"></div>
        <div class="exam-row"><label>Total Questions</label><input type="number" id="cp-total" min="1" max="10" value="7"></div>
        <div class="exam-row"><label>Difficulty</label><select id="cp-diff" style="padding:10px 12px; border-radius:var(--r); border:1px solid var(--border); background:var(--paper); font-size:14px; color:var(--ink);"><option value="">—</option><option>Easy</option><option>Medium</option><option>Hard</option></select></div>
      </div>
      <div class="exam-row" style="margin-bottom:14px;"><label>Notes</label><input type="text" id="cp-notes" placeholder="Topic, source, what you missed..."></div>
      <button class="btn" id="add-cars">+ Log Passage</button>
    </div>
    <div class="panel">
      <h2>Passage History</h2>
      ${carsListHtml}
    </div>
  `;

  document.getElementById("add-exam").onclick = () => {
    const exam = {
      id: Date.now().toString(),
      date: document.getElementById("ex-date").value,
      overall: parseInt(document.getElementById("ex-overall").value) || 0,
      cp: parseInt(document.getElementById("ex-cp").value) || 0,
      cars: parseInt(document.getElementById("ex-cars").value) || 0,
      bb: parseInt(document.getElementById("ex-bb").value) || 0,
      ps: parseInt(document.getElementById("ex-ps").value) || 0,
      notes: document.getElementById("ex-notes").value,
    };
    if (!exam.date || !exam.overall) { alert("Date and overall score are required."); return; }
    state.exams.push(exam);
    triggerHaptic('heavy'); // logging a full exam = big moment
    saveState();
    renderMCAT();
  };
  document.getElementById("add-cars").onclick = () => {
    const correctVal = document.getElementById("cp-correct").value;
    if (!document.getElementById("cp-date").value || correctVal === "") {
      alert("Date and correct answers are required."); return;
    }
    const passage = {
      id: Date.now().toString(),
      date: document.getElementById("cp-date").value,
      correct: parseInt(correctVal),
      total: parseInt(document.getElementById("cp-total").value) || 7,
      difficulty: document.getElementById("cp-diff").value,
      notes: document.getElementById("cp-notes").value,
    };
    if (!state.carsPassages) state.carsPassages = [];
    state.carsPassages.push(passage);
    triggerHaptic('medium'); // logging a CARS passage
    saveState();
    renderMCAT();
  };
  for (const btn of content.querySelectorAll(".delete-btn[data-exam]")) {
    btn.onclick = () => {
      if (!confirm("Delete this exam?")) return;
      state.exams = state.exams.filter(e => e.id !== btn.dataset.exam);
      saveState();
      renderMCAT();
    };
  }
  for (const btn of content.querySelectorAll(".delete-btn[data-cars]")) {
    btn.onclick = () => {
      if (!confirm("Delete this passage?")) return;
      state.carsPassages = state.carsPassages.filter(p => p.id !== btn.dataset.cars);
      saveState();
      renderMCAT();
    };
  }
}

// ----- DASHBOARD -----
function renderDashboard() {
  let daysDone = 0, daysTotal = 0;
  let runMiActual = 0, runMiPlanned = 0;
  let runDaysChecked = 0, runDaysTotal = 0;
  let mcatChecked = 0, mcatTotal = 0;
  let ankiChecked = 0, ankiTotal = 0;
  let programChecked = 0, programTotal = 0;

  for (const w of WEEKS) {
    for (let i = 0; i < 7; i++) {
      const date = addDays(w.start, i);
      const info = getDayInfo(date);
      daysTotal++;
      const real = info.tasks.filter(t => t.id !== "rest");
      const allDone = real.length > 0 && real.every(t => isChecked(date, t.id));
      if (allDone) daysDone++;

      if (typeof w.plan[i] === "number") {
        runMiPlanned += w.plan[i];
        runDaysTotal++;
        if (isChecked(date, "run")) runDaysChecked++;
      }
      const r = state.runs[date];
      if (r && r.actual) runMiActual += r.actual;

      for (const t of real) {
        if (t.id === "mcat" || t.id === "exam" || t.id === "examreview") { mcatTotal++; if (isChecked(date, t.id)) mcatChecked++; }
        if (t.id === "anki") { ankiTotal++; if (isChecked(date, t.id)) ankiChecked++; }
        if (t.id === "program") { programTotal++; if (isChecked(date, t.id)) programChecked++; }
      }
    }
  }

  const ankiTotalDone = ANKI_DECKS.reduce((s,d) => s + ankiActualTotal(d.id), 0);
  const ankiCardPct = Math.round(ankiTotalDone / ANKI_TOTAL * 100);
  const todayAnchor = (todayISO() < SUMMER_START) ? SUMMER_START : (todayISO() > SUMMER_END ? SUMMER_END : todayISO());
  const ankiBacklogTotal = ANKI_DECKS.reduce((s,d) => s + ankiBacklog(d.id, addDays(todayAnchor, -1)), 0);
  const runPct = runMiPlanned ? Math.round(runMiActual / runMiPlanned * 100) : 0;
  const mcatExamCount = state.exams.length;
  const dayPct = daysTotal ? Math.round(daysDone/daysTotal*100) : 0;

  // Streak: count back from today (or yesterday if today not fully done)
  let streak = 0;
  let d = todayISO();
  if (d > SUMMER_END) d = SUMMER_END;
  while (d >= SUMMER_START) {
    const info = getDayInfo(d);
    const real = info.tasks.filter(t => t.id !== "rest");
    if (real.length === 0) break;
    if (real.every(t => isChecked(d, t.id))) streak++;
    else break;
    d = addDays(d, -1);
  }

  // MCAT pillar combines study checks + exams logged
  const mcatStudyPct = mcatTotal ? mcatChecked/mcatTotal : 0;
  const mcatExamPct = mcatExamCount / 11;
  const mcatPct = Math.round((mcatStudyPct * 0.6 + mcatExamPct * 0.4) * 100);
  // Anki pillar combines card progress + daily session check
  const ankiSessionPct = ankiTotal ? ankiChecked/ankiTotal : 0;
  const ankiPillarPct = Math.round((ankiCardPct/100 * 0.6 + ankiSessionPct * 0.4) * 100);
  // Run pillar: miles + check-ins
  const runSessionPct = runDaysTotal ? runDaysChecked/runDaysTotal : 0;
  const runPillarPct = Math.round((runPct/100 * 0.6 + runSessionPct * 0.4) * 100);

  content.innerHTML = `
    <div class="dash-grid">
      <div class="stat-card theme-days">
        <div class="stat-label">Days Complete</div>
        <div class="stat-value">${daysDone} <span class="frac">/ ${daysTotal}</span></div>
        <div class="stat-sub">${dayPct}% of summer · ${77 - daysTotal} remaining if any</div>
      </div>
      <div class="stat-card theme-streak">
        <div class="stat-label">Current Streak</div>
        <div class="stat-value">${streak} <span class="frac">days</span></div>
        <div class="stat-sub">Consecutive full days</div>
      </div>
      <div class="stat-card theme-miles">
        <div class="stat-label">Miles Logged</div>
        <div class="stat-value">${runMiActual.toFixed(1)} <span class="frac">/ ${runMiPlanned.toFixed(0)}</span></div>
        <div class="stat-sub">${runPct}% of planned mileage</div>
      </div>
      <div class="stat-card theme-anki">
        <div class="stat-label">Anki Cards</div>
        <div class="stat-value">${ankiTotalDone} <span class="frac">/ ${ANKI_TOTAL}</span></div>
        <div class="stat-sub">${ankiCardPct}% complete</div>
      </div>
      <div class="stat-card theme-backlog">
        <div class="stat-label">Anki Backlog</div>
        <div class="stat-value">${ankiBacklogTotal > 0 ? "+" : ""}${ankiBacklogTotal}</div>
        <div class="stat-sub">${ankiBacklogTotal > 0 ? "cards behind" : (ankiBacklogTotal < 0 ? "cards ahead" : "on plan")}</div>
      </div>
      <div class="stat-card theme-mcat">
        <div class="stat-label">Practice Exams</div>
        <div class="stat-value">${mcatExamCount} <span class="frac">/ 11</span></div>
        <div class="stat-sub">${Math.round(mcatExamCount/11*100)}% logged</div>
      </div>
    </div>

    <div class="panel">
      <h2>Three Pillars</h2>
      <div class="pillar-bars">
        <div class="pillar-mcat">
          <div class="pillar-head"><span class="pillar-name">MCAT Prep</span><span class="pillar-pct">${mcatPct}%</span></div>
          <div class="pillar-bar"><div class="pillar-bar-fill" style="width:${Math.min(100,mcatPct)}%;"></div></div>
          <div class="hint" style="margin-top:4px;">${mcatChecked}/${mcatTotal} study sessions · ${mcatExamCount}/11 practice exams</div>
        </div>
        <div class="pillar-run">
          <div class="pillar-head"><span class="pillar-name">Marathon Training</span><span class="pillar-pct">${runPillarPct}%</span></div>
          <div class="pillar-bar"><div class="pillar-bar-fill" style="width:${Math.min(100,runPillarPct)}%;"></div></div>
          <div class="hint" style="margin-top:4px;">${runMiActual.toFixed(1)}/${runMiPlanned.toFixed(0)} mi · ${runDaysChecked}/${runDaysTotal} runs done · Marathon ${daysBetween(todayISO(), MARATHON_DATE)}d away</div>
        </div>
        <div class="pillar-anki">
          <div class="pillar-head"><span class="pillar-name">Anki Mastery</span><span class="pillar-pct">${ankiPillarPct}%</span></div>
          <div class="pillar-bar"><div class="pillar-bar-fill" style="width:${Math.min(100,ankiPillarPct)}%;"></div></div>
          <div class="hint" style="margin-top:4px;">${ankiTotalDone}/${ANKI_TOTAL} cards · ${ankiChecked}/${ankiTotal} daily sessions</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Other Stats</h2>
      <div class="dash-grid">
        <div class="stat-card theme-program">
          <div class="stat-label">Program Days Done</div>
          <div class="stat-value">${programChecked} <span class="frac">/ ${programTotal}</span></div>
          <div class="stat-sub">Mon–Fri · Jun 8 – Jul 31</div>
        </div>
        <div class="stat-card theme-days">
          <div class="stat-label">Days Until Aug 2</div>
          <div class="stat-value">${todayISO() <= SUMMER_END ? daysBetween(todayISO(), SUMMER_END) : 0}</div>
          <div class="stat-sub">End of summer plan</div>
        </div>
        <div class="stat-card theme-cool">
          <div class="stat-label">Days Until Marathon</div>
          <div class="stat-value">${daysBetween(todayISO(), MARATHON_DATE)}</div>
          <div class="stat-sub">Jan 18, 2027 · Baton Rouge</div>
        </div>
      </div>
    </div>

    ${buildSyncPanel()}
    <div class="panel">
      <h2>Data Management</h2>
      <div class="row">
        <button class="btn btn-ghost" id="export-data">Export Backup</button>
        <button class="btn btn-ghost" id="import-data">Import Backup</button>
        <button class="btn btn-ghost" id="reset-data" style="color:var(--danger); border-color:var(--danger);">Reset All Progress</button>
        <input type="file" id="import-file" accept=".json" style="display:none;">
      </div>
      <div class="hint" style="margin-top:10px;">All progress is saved in this browser's localStorage. Export periodically to back up your data — clearing browser data will erase it.</div>
    </div>
  `;

  document.getElementById("export-data").onclick = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `summer2026-backup-${todayISO()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
  document.getElementById("import-data").onclick = () => document.getElementById("import-file").click();
  document.getElementById("import-file").onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const fr = new FileReader();
    fr.onload = () => {
      try {
        const imported = JSON.parse(fr.result);
        if (!confirm("Replace current progress with imported data?")) return;
        const def2 = defaultState();
        state = { ...def2, ...imported, anki: { ...def2.anki, ...(imported.anki||{}) }, settings: { ...def2.settings, ...(imported.settings||{}), completionMode: { ...def2.settings.completionMode, ...((imported.settings && imported.settings.completionMode)||{}) } } };
        saveState();
        render();
      } catch (err) { alert("Invalid file: " + err.message); }
    };
    fr.readAsText(f);
  };
  document.getElementById("reset-data").onclick = () => {
    if (!confirm("Erase ALL progress? This cannot be undone.")) return;
    if (!confirm("Really sure? Last chance.")) return;
    state = defaultState();
    saveState();
    render();
  };
  wireSyncPanel();
}

// ----- SETTINGS -----
function renderSettings() {
  const isTouch = isTouchDevice();
  const cm = state.settings.completionMode;
  const activeMode = isTouch ? cm.mobile : cm.desktop;

  const previewBlock = activeMode === "swipe" ? `
    <div class="settings-preview">
      <div class="settings-preview-title">Try it</div>
      <div class="settings-preview-sub">Drag the row right past the line — release to complete <span class="demo-arrow">→</span></div>
      <div class="task-list" id="settings-demo-list">
        <div class="task-row swipe-enabled" data-task-row="demo">
          <div class="task-swipe-bg" aria-hidden="true"><span class="task-swipe-icon">✓</span><span class="task-swipe-label">Release to complete</span></div>
          <div class="task" data-task="demo" data-cat="run">
            <div class="checkbox"></div>
            <div class="task-content">
              <div class="task-label">Demo task</div>
              <div class="task-meta">Practice the gesture — this one resets after each swipe.</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  ` : `
    <div class="settings-preview">
      <div class="settings-preview-title">Try it</div>
      <div class="settings-preview-sub">Tap anywhere on the row to mark it done.</div>
      <div class="task-list" id="settings-demo-list">
        <div class="task-row" data-task-row="demo">
          <div class="task" data-task="demo" data-cat="run">
            <div class="checkbox"></div>
            <div class="task-content">
              <div class="task-label">Demo task</div>
              <div class="task-meta">Click anywhere to toggle.</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;

  content.innerHTML = `
    <div class="panel">
      <h2>Settings</h2>
      <p class="settings-intro">Tune how the Master Plan companion behaves on each kind of device. Preferences save instantly and sync along with the rest of your data.</p>

      <div class="settings-section">
        <h3>Task Completion</h3>
        <p class="settings-hint" style="margin-bottom:16px; max-width:600px;">
          Choose how you mark daily checklist items as done on the <strong>Today</strong> tab.
          Tap is fast and precise with a mouse; swipe-right feels great on a phone and prevents stray-finger taps —
          a satisfying way to "cross things off" like you would on paper.
        </p>

        <div class="settings-row">
          <div class="settings-label">
            <strong>Mobile / touch ${isTouch ? `<span class="this-device-tag">● this device</span>` : ""}</strong>
            <span class="settings-hint">Phones, tablets, and any touch screen.</span>
          </div>
          <div class="seg" role="radiogroup" aria-label="Mobile completion mode">
            <button class="seg-btn ${cm.mobile === "tap" ? "active" : ""}" data-set-mobile="tap" role="radio" aria-checked="${cm.mobile === "tap"}">Tap to complete</button>
            <button class="seg-btn ${cm.mobile === "swipe" ? "active" : ""}" data-set-mobile="swipe" role="radio" aria-checked="${cm.mobile === "swipe"}">Swipe to complete</button>
          </div>
        </div>

        <div class="settings-row">
          <div class="settings-label">
            <strong>Desktop / mouse ${!isTouch ? `<span class="this-device-tag">● this device</span>` : ""}</strong>
            <span class="settings-hint">Laptops and desktops with a pointer.</span>
          </div>
          <div class="seg" role="radiogroup" aria-label="Desktop completion mode">
            <button class="seg-btn ${cm.desktop === "tap" ? "active" : ""}" data-set-desktop="tap" role="radio" aria-checked="${cm.desktop === "tap"}">Tap to complete</button>
            <button class="seg-btn ${cm.desktop === "swipe" ? "active" : ""}" data-set-desktop="swipe" role="radio" aria-checked="${cm.desktop === "swipe"}">Swipe to complete</button>
          </div>
        </div>

        ${previewBlock}
      </div>

      <div class="settings-section">
        <h3>About</h3>
        <div class="settings-hint" style="max-width:560px;">
          Summer 2026 · Master Plan Companion. All progress lives in your browser's storage and (optionally) a private Gist backup — see the <strong>Dashboard → Cloud Sync</strong> panel.
        </div>
      </div>
    </div>
  `;

  for (const btn of content.querySelectorAll("[data-set-mobile]")) {
    btn.onclick = () => {
      state.settings.completionMode.mobile = btn.dataset.setMobile;
      saveState();
      renderSettings();
    };
  }
  for (const btn of content.querySelectorAll("[data-set-desktop]")) {
    btn.onclick = () => {
      state.settings.completionMode.desktop = btn.dataset.setDesktop;
      saveState();
      renderSettings();
    };
  }

  // Wire the demo task so users can practice the swipe / tap
  const demoList = document.getElementById("settings-demo-list");
  if (demoList) {
    const demoRow = demoList.querySelector(".task-row");
    const demoTask = demoList.querySelector(".task");
    const resetDemo = () => {
      demoTask.classList.remove("done");
      demoRow.classList.remove("swipe-complete");
      demoTask.style.setProperty("--swipe-x", "0px");
    };
    if (activeMode === "swipe") {
      attachSwipeToComplete(demoRow, () => {
        demoTask.classList.add("done");
        // Reset shortly after — the demo is just practice
        setTimeout(() => resetDemo(), 1200);
      });
      // play a brief "swipe me" hint on first paint
      demoRow.classList.add("swipe-hint");
      setTimeout(() => demoRow.classList.remove("swipe-hint"), 1700);
    } else {
      demoTask.addEventListener("click", () => {
        demoTask.classList.toggle("done");
        setTimeout(() => demoTask.classList.remove("done"), 1200);
      });
    }
  }
}

// Init — render from localStorage immediately, then pull latest from cloud
updateHeroTitle(false);
_replayTabAnim = true; render();
playLaunchAnimation();
if (syncCfg.token && syncCfg.gistId) {
  pullFromGist().then(ok => { if (ok) render(); });
}
</script>
<script>
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
